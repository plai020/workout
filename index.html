<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f3f6fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="運動日曆 V3" />
  <title>運動生活整合日曆 V3.0</title>
  <style>
    :root { --bg:#f3f6fb; --panel:#fff; --line:#dbe4f2; --text:#0f172a; --muted:#64748b; --accent:#2563eb; --run:#fee2e2; --walk:#fef3c7; --hike:#dbeafe; --lift:#ede9fe; --run-dot:#ef4444; --walk-dot:#f59e0b; --hike-dot:#3b82f6; --lift-dot:#8b5cf6; --tab-bg:#fff; --shadow:0 10px 24px rgba(15,23,42,.1); }
    body.theme-dark { --bg:#0b1020; --panel:#151d31; --line:#24314d; --text:#edf2ff; --muted:#9fb0d1; --accent:#60a5fa; --run:#422028; --walk:#483822; --hike:#1d2e49; --lift:#2c244a; --tab-bg:#11182a; --shadow:0 10px 24px rgba(0,0,0,.35); }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:"Segoe UI","Noto Sans TC",system-ui,-apple-system,sans-serif; min-height:100vh; }
    button,input,select,textarea { font:inherit; color:inherit; }
    .app { max-width:920px; margin:0 auto; padding:calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 84px); }
    .top-bar { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:8px; }
    .title { font-size:1rem; font-weight:700; }
    .toggle-btn { border:1px solid var(--line); background:var(--panel); border-radius:10px; padding:7px 10px; cursor:pointer; }
    .calendar { background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:10px; }
    .month-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .icon-btn { width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:transparent; cursor:pointer; }
    .month-label { font-weight:700; }
    .calendar-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; }
    .dow { text-align:center; color:var(--muted); font-size:.78rem; padding:2px 0; }
    .day { border:1px solid var(--line); border-radius:12px; min-height:78px; background:#fff; cursor:pointer; padding:5px; display:flex; flex-direction:column; gap:4px; overflow:hidden; position:relative; }
    body.theme-dark .day { background:#182138; }
    .day.outside { opacity:.4; }
    .day.today { border:2px solid var(--accent); padding:4px; }
    .day-num { font-size:.8rem; font-weight:700; }
    .count-badge { position:absolute; top:4px; right:4px; min-width:18px; height:18px; border-radius:999px; border:1px solid var(--line); background:var(--panel); font-size:.68rem; display:inline-flex; align-items:center; justify-content:center; padding:0 4px; font-weight:700; }
    .dots { display:flex; flex-wrap:wrap; gap:3px; max-height:34px; overflow:hidden; }
    .dot { width:8px; height:8px; border-radius:2px; display:inline-block; }
    .dot.run{background:var(--run-dot);} .dot.walk{background:var(--walk-dot);} .dot.hike{background:var(--hike-dot);} .dot.lift{background:var(--lift-dot);}
    .scrim { position:fixed; inset:0; background:rgba(2,6,23,.55); opacity:0; pointer-events:none; transition:opacity .2s; z-index:30; }
    .scrim.show { opacity:1; pointer-events:auto; }
    .sheet { position:fixed; left:0; right:0; bottom:0; max-height:80vh; background:var(--panel); border-top-left-radius:18px; border-top-right-radius:18px; border:1px solid var(--line); transform:translateY(110%); transition:transform .25s; overflow:auto; z-index:40; padding:12px; }
    .sheet.show { transform:translateY(0); }
    .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .cards { display:grid; gap:8px; margin-top:8px; }
    .card { border:1px solid var(--line); border-radius:12px; padding:10px; display:grid; gap:4px; }
    .card.run{background:var(--run);} .card.walk{background:var(--walk);} .card.hike{background:var(--hike);} .card.lift{background:var(--lift);}
    .meta { font-size:.82rem; color:var(--muted); }
    .btn { border:1px solid var(--line); border-radius:10px; background:var(--panel); padding:8px 10px; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.danger { background:#dc2626; border-color:#dc2626; color:#fff; }
    .cover { position:fixed; inset:0; background:var(--bg); z-index:45; display:none; overflow:auto; }
    .cover.show { display:block; }
    .cover-inner { max-width:920px; margin:0 auto; padding:calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 90px); display:grid; gap:10px; }
    .panel { border:1px solid var(--line); border-radius:14px; background:var(--panel); padding:10px; display:grid; gap:8px; }
    .panel.type-run { background:color-mix(in oklab,var(--run) 60%,var(--panel)); }
    .panel.type-walk { background:color-mix(in oklab,var(--walk) 60%,var(--panel)); }
    .panel.type-hike { background:color-mix(in oklab,var(--hike) 60%,var(--panel)); }
    .panel.type-lift { background:color-mix(in oklab,var(--lift) 60%,var(--panel)); }
    .type-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .type-btn { border:1px solid var(--line); border-radius:12px; background:var(--panel); min-height:64px; display:grid; place-items:center; gap:2px; cursor:pointer; font-weight:700; }
    .type-btn.active { border:2px solid var(--accent); }
    .field { display:grid; gap:4px; }
    .field > label { font-size:.84rem; color:var(--muted); }
    input,select,textarea { width:100%; border:1px solid var(--line); border-radius:10px; background:#fff; padding:8px; }
    body.theme-dark input,body.theme-dark select,body.theme-dark textarea { background:#1a243d; }
    textarea { min-height:70px; resize:vertical; }
    .grid-2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; }
    .hidden { display:none !important; }
    .list { display:grid; gap:8px; max-height:280px; overflow:auto; }
    .list-item { border:1px solid var(--line); border-radius:10px; background:var(--panel); padding:8px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .chart { height:220px; border:1px solid var(--line); border-radius:12px; padding:8px; display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); align-items:end; gap:8px; background:var(--panel); }
    .bar-col { display:grid; gap:4px; justify-items:center; }
    .bar { width:100%; border-radius:8px 8px 4px 4px; min-height:6px; background:linear-gradient(180deg,#60a5fa,#2563eb); }
    .bar-label { font-size:.72rem; color:var(--muted); }
    .bar-val { font-size:.72rem; font-weight:700; }
    .tabbar { position:fixed; left:0; right:0; bottom:0; z-index:70; border-top:1px solid var(--line); background:var(--tab-bg); padding:8px 8px calc(env(safe-area-inset-bottom) + 8px); display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
    .tab-btn { border:1px solid var(--line); border-radius:10px; background:transparent; cursor:pointer; display:grid; justify-items:center; gap:2px; padding:6px 2px; font-size:.74rem; }
    .tab-btn .icon { font-size:1.15rem; line-height:1; }
    @media (max-width:720px){ .grid-3{grid-template-columns:1fr;} .grid-2{grid-template-columns:1fr;} .type-grid{grid-template-columns:repeat(2,minmax(0,1fr));} .day{min-height:70px;} }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <main class="app">
    <div class="top-bar">
      <div class="title">運動生活整合日曆 V3.0</div>
      <button id="themeBtn" class="toggle-btn" type="button">切換深色</button>
    </div>
    <section class="calendar">
      <div class="month-row">
        <button id="prevMonthBtn" class="icon-btn" type="button">◀</button>
        <div id="monthLabel" class="month-label"></div>
        <button id="nextMonthBtn" class="icon-btn" type="button">▶</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>
  </main>
  <div id="scrim" class="scrim"></div>
  <section id="daySheet" class="sheet">
    <div class="row"><strong id="sheetTitle">當日紀錄</strong><button id="closeSheetBtn" class="btn" type="button">關閉</button></div>
    <div id="dayCards" class="cards"></div>
  </section>
  <section id="cover" class="cover">
    <div class="cover-inner">
      <div class="row"><strong id="coverTitle">新增</strong><button id="closeCoverBtn" class="btn" type="button">關閉</button></div>
      <section id="entryPage" class="panel type-run">
        <div class="type-grid">
          <button class="type-btn active" data-type="run" type="button"><span>🏃</span><span>跑</span></button>
          <button class="type-btn" data-type="walk" type="button"><span>🚶</span><span>走</span></button>
          <button class="type-btn" data-type="hike" type="button"><span>⛰️</span><span>山</span></button>
          <button class="type-btn" data-type="lift" type="button"><span>🏋️</span><span>重</span></button>
        </div>
        <form id="entryForm" class="grid-2">
          <div class="field"><label for="recordDate">日期</label><input id="recordDate" type="date" required /></div>
          <div class="field"><label for="titleInput">標題</label><input id="titleInput" required maxlength="48" /></div>
          <div class="field"><label for="noteInput">備註</label><textarea id="noteInput"></textarea></div>
          <div id="ocrBlock" class="field">
            <label for="ocrInput">OCR 截圖辨識</label><input id="ocrInput" type="file" accept="image/*" />
            <button id="ocrBtn" class="btn" type="button">辨識數字</button><div id="ocrStatus" class="meta">只抓數字，圖片不保存。</div>
          </div>
          <div id="outdoorFields" class="grid-3">
            <div class="field"><label for="distanceInput">距離 (km)</label><input id="distanceInput" type="number" min="0" step="0.01" /></div>
            <div class="field"><label for="hoursInput">時間-小時</label><input id="hoursInput" type="number" min="0" step="1" /></div>
            <div class="field"><label for="minutesInput">時間-分鐘</label><input id="minutesInput" type="number" min="0" max="59" step="1" /></div>
            <div class="field"><label for="stepsInput">步數</label><input id="stepsInput" type="number" min="0" step="1" /></div>
            <div class="field"><label for="elevUpInput">爬升 (m)</label><input id="elevUpInput" type="number" min="0" step="1" /></div>
            <div class="field"><label for="elevDownInput">下降 (m)</label><input id="elevDownInput" type="number" min="0" step="1" /></div>
          </div>
          <div id="liftFields" class="grid-3 hidden">
            <div class="field"><label for="partSelect">部位</label><select id="partSelect"></select></div>
            <div class="field"><label for="exerciseSelect">動作</label><select id="exerciseSelect"></select></div>
            <div class="field"><label for="weightInput">重量 (kg)</label><input id="weightInput" type="number" min="0" step="0.5" /></div>
            <div class="field"><label for="setsInput">組數</label><input id="setsInput" type="number" min="0" step="1" /></div>
            <div class="field"><label for="repsInput">次數</label><input id="repsInput" type="number" min="0" step="1" /></div>
            <div class="field"><label for="secondsInput">秒數</label><input id="secondsInput" type="number" min="0" step="1" /></div>
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;"><button class="btn primary" type="submit">儲存</button><button id="resetFormBtn" class="btn" type="button">清空</button></div>
        </form>
      </section>
      <section id="managePage" class="panel hidden">
        <div class="grid-2">
          <div class="field"><label for="managePartSelect">部位</label><select id="managePartSelect"></select></div>
          <div class="field"><label for="newPartInput">新增部位</label><div style="display:flex; gap:8px;"><input id="newPartInput" /><button id="addPartBtn" class="btn" type="button">新增</button><button id="deletePartBtn" class="btn danger" type="button">刪除</button></div></div>
        </div>
        <div class="field"><label for="newExerciseInput">新增動作</label><div style="display:flex; gap:8px;"><input id="newExerciseInput" /><button id="addExerciseBtn" class="btn" type="button">新增</button></div></div>
        <div id="exerciseList" class="list"></div>
      </section>
      <section id="statsPage" class="panel hidden">
        <div class="grid-2">
          <div class="field"><label for="periodSelect">期間</label><select id="periodSelect"><option value="day">日</option><option value="month">月</option><option value="quarter">季</option><option value="year">年</option></select></div>
          <div class="field"><label>&nbsp;</label><button id="updateChartBtn" class="btn">更新圖表</button></div>
        </div>
        <div id="statsSummary" class="meta"></div>
        <div id="chart" class="chart"></div>
      </section>
      <section id="backupPage" class="panel hidden">
        <div style="display:flex; gap:8px; flex-wrap:wrap;"><button id="exportBtn" class="btn" type="button">匯出備份</button><button id="importBtn" class="btn" type="button">匯入備份</button><input id="importFile" class="hidden" type="file" accept="application/json" /></div>
        <div class="meta">LocalStorage 純文字/數值資料備份。</div>
      </section>
    </div>
  </section>
  <nav class="tabbar">
    <button class="tab-btn" data-page="entry" type="button"><span class="icon">＋</span><span>新增</span></button>
    <button class="tab-btn" data-page="manage" type="button"><span class="icon">⚙️</span><span>管理</span></button>
    <button class="tab-btn" data-page="stats" type="button"><span class="icon">📊</span><span>統計</span></button>
    <button class="tab-btn" data-page="backup" type="button"><span class="icon">💾</span><span>備份</span></button>
  </nav>
  <script>
    const STORAGE_KEY = "workout_v30_records";
    const GYM_KEY = "workout_v30_gym";
    const THEME_KEY = "workout_v30_theme";
    const DAY_NAMES = ["日","一","二","三","四","五","六"];
    const DEFAULT_GYM = { 胸:["臥推"], 背:["划船"], 腿:["深蹲"] };
    const state = { cursorDate:new Date(), selectedDateKey:toDateKey(new Date()), selectedType:"run", editId:null, records:loadJson(STORAGE_KEY,{}), gym:loadJson(GYM_KEY,structuredClone(DEFAULT_GYM)) };
    const els = {
      themeBtn:document.getElementById("themeBtn"), prevMonthBtn:document.getElementById("prevMonthBtn"), nextMonthBtn:document.getElementById("nextMonthBtn"), monthLabel:document.getElementById("monthLabel"), calendarGrid:document.getElementById("calendarGrid"),
      scrim:document.getElementById("scrim"), daySheet:document.getElementById("daySheet"), closeSheetBtn:document.getElementById("closeSheetBtn"), sheetTitle:document.getElementById("sheetTitle"), dayCards:document.getElementById("dayCards"),
      cover:document.getElementById("cover"), closeCoverBtn:document.getElementById("closeCoverBtn"), coverTitle:document.getElementById("coverTitle"), typeBtns:[...document.querySelectorAll(".type-btn")], tabBtns:[...document.querySelectorAll(".tab-btn")],
      entryPage:document.getElementById("entryPage"), managePage:document.getElementById("managePage"), statsPage:document.getElementById("statsPage"), backupPage:document.getElementById("backupPage"), entryForm:document.getElementById("entryForm"),
      recordDate:document.getElementById("recordDate"), titleInput:document.getElementById("titleInput"), noteInput:document.getElementById("noteInput"), ocrBlock:document.getElementById("ocrBlock"), ocrInput:document.getElementById("ocrInput"),
      ocrBtn:document.getElementById("ocrBtn"), ocrStatus:document.getElementById("ocrStatus"), outdoorFields:document.getElementById("outdoorFields"), distanceInput:document.getElementById("distanceInput"), hoursInput:document.getElementById("hoursInput"),
      minutesInput:document.getElementById("minutesInput"), stepsInput:document.getElementById("stepsInput"), elevUpInput:document.getElementById("elevUpInput"), elevDownInput:document.getElementById("elevDownInput"), liftFields:document.getElementById("liftFields"),
      partSelect:document.getElementById("partSelect"), exerciseSelect:document.getElementById("exerciseSelect"), weightInput:document.getElementById("weightInput"), setsInput:document.getElementById("setsInput"), repsInput:document.getElementById("repsInput"),
      secondsInput:document.getElementById("secondsInput"), resetFormBtn:document.getElementById("resetFormBtn"), managePartSelect:document.getElementById("managePartSelect"), newPartInput:document.getElementById("newPartInput"), addPartBtn:document.getElementById("addPartBtn"),
      deletePartBtn:document.getElementById("deletePartBtn"), newExerciseInput:document.getElementById("newExerciseInput"), addExerciseBtn:document.getElementById("addExerciseBtn"), exerciseList:document.getElementById("exerciseList"), periodSelect:document.getElementById("periodSelect"),
      updateChartBtn:document.getElementById("updateChartBtn"), statsSummary:document.getElementById("statsSummary"), chart:document.getElementById("chart"), exportBtn:document.getElementById("exportBtn"), importBtn:document.getElementById("importBtn"), importFile:document.getElementById("importFile")
    };
    function init(){ applyTheme(); bindEvents(); els.recordDate.value = state.selectedDateKey; renderGymSelectors(); syncTypePanel(); renderCalendar(); renderStats(); initManifest(); }
    function bindEvents(){
      els.themeBtn.addEventListener("click", toggleTheme);
      els.prevMonthBtn.addEventListener("click",()=>{ state.cursorDate = new Date(state.cursorDate.getFullYear(),state.cursorDate.getMonth()-1,1); renderCalendar(); });
      els.nextMonthBtn.addEventListener("click",()=>{ state.cursorDate = new Date(state.cursorDate.getFullYear(),state.cursorDate.getMonth()+1,1); renderCalendar(); });
      els.scrim.addEventListener("click",()=>{ closeSheet(); closeCover(); }); els.closeSheetBtn.addEventListener("click", closeSheet); els.closeCoverBtn.addEventListener("click", closeCover);
      els.tabBtns.forEach((btn)=>btn.addEventListener("click",()=>openCover(btn.dataset.page)));
      els.typeBtns.forEach((btn)=>btn.addEventListener("click",()=>setType(btn.dataset.type)));
      els.partSelect.addEventListener("change", fillExerciseOptions); els.exerciseSelect.addEventListener("change", autofillLastLift);
      els.entryForm.addEventListener("submit", saveRecord); els.resetFormBtn.addEventListener("click", resetForm); els.ocrBtn.addEventListener("click", runOCR);
      els.managePartSelect.addEventListener("change", renderExerciseList); els.addPartBtn.addEventListener("click", addPart); els.deletePartBtn.addEventListener("click", deletePart); els.addExerciseBtn.addEventListener("click", addExercise);
      els.updateChartBtn.addEventListener("click", renderStats); els.periodSelect.addEventListener("change", renderStats);
      els.exportBtn.addEventListener("click", exportBackup); els.importBtn.addEventListener("click",()=>els.importFile.click()); els.importFile.addEventListener("change", importBackup);
    }
    function applyTheme(){ const saved = localStorage.getItem(THEME_KEY); document.body.classList.toggle("theme-dark", saved === "dark"); els.themeBtn.textContent = saved === "dark" ? "切換淺色" : "切換深色"; }
    function toggleTheme(){ const isDark = document.body.classList.toggle("theme-dark"); localStorage.setItem(THEME_KEY, isDark ? "dark" : "light"); applyTheme(); }
    function openCover(page){ els.cover.classList.add("show"); els.scrim.classList.add("show"); const pages={entry:els.entryPage,manage:els.managePage,stats:els.statsPage,backup:els.backupPage}; Object.values(pages).forEach((p)=>p.classList.add("hidden")); pages[page].classList.remove("hidden"); els.coverTitle.textContent={entry:"新增",manage:"管理",stats:"統計",backup:"備份"}[page]; if(page==="manage") renderExerciseList(); if(page==="stats") renderStats(); }
    function closeCover(){ els.cover.classList.remove("show"); if(!els.daySheet.classList.contains("show")) els.scrim.classList.remove("show"); }
    function openSheet(dateKey,dateObj){ state.selectedDateKey=dateKey; state.cursorDate = new Date(dateObj.getFullYear(),dateObj.getMonth(),1); els.recordDate.value=dateKey; renderCalendar(); renderDayCards(dateKey); els.daySheet.classList.add("show"); els.scrim.classList.add("show"); }
    function closeSheet(){ els.daySheet.classList.remove("show"); if(!els.cover.classList.contains("show")) els.scrim.classList.remove("show"); }
    function renderCalendar(){
      const y=state.cursorDate.getFullYear(); const m=state.cursorDate.getMonth(); els.monthLabel.textContent=`${y} 年 ${m+1} 月`; els.calendarGrid.innerHTML="";
      DAY_NAMES.forEach((d)=>{ const el=document.createElement("div"); el.className="dow"; el.textContent=d; els.calendarGrid.appendChild(el); });
      const first=new Date(y,m,1); const start=first.getDay(); const monthDays=new Date(y,m+1,0).getDate(); const prevDays=new Date(y,m,0).getDate();
      for(let i=0;i<42;i+=1){
        const cell=document.createElement("button"); cell.type="button"; cell.className="day"; let dateObj; let n;
        if(i<start){ n=prevDays-start+i+1; dateObj=new Date(y,m-1,n); cell.classList.add("outside"); }
        else if(i>=start+monthDays){ n=i-start-monthDays+1; dateObj=new Date(y,m+1,n); cell.classList.add("outside"); }
        else { n=i-start+1; dateObj=new Date(y,m,n); }
        const key=toDateKey(dateObj); const list=state.records[key]||[]; if(key===toDateKey(new Date())) cell.classList.add("today");
        const numEl=document.createElement("div"); numEl.className="day-num"; numEl.textContent=String(n); cell.appendChild(numEl);
        if(list.length){ const badge=document.createElement("span"); badge.className="count-badge"; badge.textContent=String(list.length); cell.appendChild(badge); }
        const dots=document.createElement("div"); dots.className="dots"; list.slice(0,12).forEach((r)=>{ const d=document.createElement("span"); d.className=`dot ${r.type}`; dots.appendChild(d); }); cell.appendChild(dots);
        cell.addEventListener("click",()=>openSheet(key,dateObj)); els.calendarGrid.appendChild(cell);
      }
    }
    function renderDayCards(dateKey){
      const [yy,mm,dd]=dateKey.split("-").map(Number); els.sheetTitle.textContent=`${yy}/${mm}/${dd} 紀錄`; const list=state.records[dateKey]||[];
      if(!list.length){ els.dayCards.innerHTML=`<div class="card">當日尚無紀錄</div>`; return; }
      els.dayCards.innerHTML=list.map((r)=>`<article class="card ${r.type}"><strong>${escapeHtml(r.title||"未命名")}</strong><div>${escapeHtml(r.note||"無備註")}</div><div class="meta">${escapeHtml(cardMeta(r))}</div><div style="display:flex; gap:8px;"><button class="btn" data-edit="${r.id}" type="button">編輯</button><button class="btn danger" data-del="${r.id}" type="button">刪除</button></div></article>`).join("");
      els.dayCards.querySelectorAll("[data-edit]").forEach((b)=>b.addEventListener("click",()=>editRecord(b.dataset.edit)));
      els.dayCards.querySelectorAll("[data-del]").forEach((b)=>b.addEventListener("click",()=>deleteRecord(b.dataset.del)));
    }
    function cardMeta(r){ if(r.type==="lift") return `部位 ${r.part||"-"} | 動作 ${r.exercise||"-"} | ${r.weight||0}kg ${r.sets||0}x${r.reps||0} | 秒數 ${r.seconds||0}`; return `距離 ${toFixed2(r.distance)} km | 時間 ${r.hours||0}h ${r.minutes||0}m | 步數 ${r.steps||0} | 爬升 ${r.elevUp||0}m`; }
    function setType(type){ state.selectedType=type; els.typeBtns.forEach((b)=>b.classList.toggle("active",b.dataset.type===type)); syncTypePanel(); }
    function syncTypePanel(){ const type=state.selectedType; els.entryPage.classList.remove("type-run","type-walk","type-hike","type-lift"); els.entryPage.classList.add(`type-${type}`); const isLift=type==="lift"; els.liftFields.classList.toggle("hidden",!isLift); els.outdoorFields.classList.toggle("hidden",isLift); els.ocrBlock.classList.toggle("hidden",isLift); if(isLift) autofillLastLift(); }
    function saveRecord(event){
      event.preventDefault(); const dateKey=els.recordDate.value; if(!dateKey) return alert("請選擇日期"); const title=els.titleInput.value.trim(); if(!title) return alert("請輸入標題");
      const payload={ id:state.editId||crypto.randomUUID(), type:state.selectedType, title, note:els.noteInput.value.trim(), createdAt:Date.now() };
      if(payload.type==="lift"){ payload.part=els.partSelect.value; payload.exercise=els.exerciseSelect.value; payload.weight=num(els.weightInput.value); payload.sets=num(els.setsInput.value); payload.reps=num(els.repsInput.value); payload.seconds=num(els.secondsInput.value); }
      else { payload.distance=num(els.distanceInput.value,2); payload.hours=num(els.hoursInput.value); payload.minutes=num(els.minutesInput.value); payload.steps=num(els.stepsInput.value); payload.elevUp=num(els.elevUpInput.value); payload.elevDown=num(els.elevDownInput.value); }
      if(!state.records[dateKey]) state.records[dateKey]=[]; if(state.editId) removeRecordFromAllDates(state.editId); state.records[dateKey].unshift(payload); persist(STORAGE_KEY,state.records); state.selectedDateKey=dateKey; resetForm(); renderCalendar(); renderStats(); closeCover(); openSheet(dateKey,fromDateKey(dateKey));
    }
    function editRecord(id){ const found=findRecord(id); if(!found) return; const {key,record}=found; state.editId=id; setType(record.type); openCover("entry"); els.recordDate.value=key; els.titleInput.value=record.title||""; els.noteInput.value=record.note||""; els.distanceInput.value=record.distance??""; els.hoursInput.value=record.hours??""; els.minutesInput.value=record.minutes??""; els.stepsInput.value=record.steps??""; els.elevUpInput.value=record.elevUp??""; els.elevDownInput.value=record.elevDown??""; els.partSelect.value=record.part||firstPart(); fillExerciseOptions(); els.exerciseSelect.value=record.exercise||firstExercise(els.partSelect.value); els.weightInput.value=record.weight??""; els.setsInput.value=record.sets??""; els.repsInput.value=record.reps??""; els.secondsInput.value=record.seconds??""; }
    function deleteRecord(id){ if(!confirm("確定刪除？")) return; removeRecordFromAllDates(id); persist(STORAGE_KEY,state.records); renderCalendar(); renderDayCards(state.selectedDateKey); renderStats(); }
    function removeRecordFromAllDates(id){ Object.keys(state.records).forEach((key)=>{ state.records[key]=state.records[key].filter((r)=>r.id!==id); }); }
    function findRecord(id){ for(const [key,list] of Object.entries(state.records)){ const record=list.find((r)=>r.id===id); if(record) return {key,record}; } return null; }
    function resetForm(){ state.editId=null; els.entryForm.reset(); els.recordDate.value=state.selectedDateKey; els.ocrInput.value=""; els.ocrStatus.textContent="只抓數字，圖片不保存。"; renderGymSelectors(); setType("run"); }
    function renderGymSelectors(){ if(!Object.keys(state.gym).length) state.gym=structuredClone(DEFAULT_GYM); const options=Object.keys(state.gym).map((p)=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join(""); els.partSelect.innerHTML=options; els.managePartSelect.innerHTML=options; fillExerciseOptions(); renderExerciseList(); }
    function fillExerciseOptions(){ const part=els.partSelect.value||firstPart(); const list=state.gym[part]||[]; els.exerciseSelect.innerHTML=list.map((e)=>`<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join(""); autofillLastLift(); }
    function firstPart(){ return Object.keys(state.gym)[0]||"綜合"; }
    function firstExercise(part){ return (state.gym[part]||[])[0]||""; }
    function addPart(){ const name=els.newPartInput.value.trim(); if(!name) return alert("請輸入部位"); if(!state.gym[name]) state.gym[name]=[]; els.newPartInput.value=""; persist(GYM_KEY,state.gym); renderGymSelectors(); }
    function deletePart(){ const part=els.managePartSelect.value; if(!part) return; if(!confirm(`刪除部位 ${part} ?`)) return; delete state.gym[part]; if(!Object.keys(state.gym).length) state.gym=structuredClone(DEFAULT_GYM); persist(GYM_KEY,state.gym); renderGymSelectors(); }
    function addExercise(){ const part=els.managePartSelect.value||firstPart(); const ex=els.newExerciseInput.value.trim(); if(!ex) return alert("請輸入動作"); if(!state.gym[part]) state.gym[part]=[]; state.gym[part].push(ex); els.newExerciseInput.value=""; persist(GYM_KEY,state.gym); renderGymSelectors(); }
    function renderExerciseList(){
      const part=els.managePartSelect.value||firstPart(); const list=state.gym[part]||[];
      els.exerciseList.innerHTML=list.map((name,idx)=>`<div class="list-item"><span>${escapeHtml(name)}</span><div style="display:flex; gap:8px;"><button class="btn" data-e-edit="${idx}" type="button">編輯</button><button class="btn danger" data-e-del="${idx}" type="button">刪除</button></div></div>`).join("")||`<div class="list-item">此部位尚無動作</div>`;
      els.exerciseList.querySelectorAll("[data-e-edit]").forEach((b)=>b.addEventListener("click",()=>{ const i=Number(b.dataset.eEdit); const next=prompt("編輯動作",list[i]); if(!next) return; list[i]=next.trim(); persist(GYM_KEY,state.gym); renderGymSelectors(); }));
      els.exerciseList.querySelectorAll("[data-e-del]").forEach((b)=>b.addEventListener("click",()=>{ const i=Number(b.dataset.eDel); list.splice(i,1); persist(GYM_KEY,state.gym); renderGymSelectors(); }));
    }
    function autofillLastLift(){ if(state.selectedType!=="lift") return; const ex=(els.exerciseSelect.value||"").trim(); if(!ex) return; const all=Object.values(state.records).flat(); const last=all.filter((r)=>r.type==="lift"&&(r.exercise||"").trim()===ex).sort((a,b)=>Number(b.createdAt||0)-Number(a.createdAt||0))[0]; if(!last) return; if(last.weight!=null) els.weightInput.value=last.weight; if(last.sets!=null) els.setsInput.value=last.sets; if(last.reps!=null) els.repsInput.value=last.reps; if(last.seconds!=null) els.secondsInput.value=last.seconds; if(last.part) els.partSelect.value=last.part; }
    async function runOCR(){
      const file=els.ocrInput.files?.[0]; if(!file) return alert("請先上傳截圖"); if(!window.Tesseract) return alert("OCR 載入失敗");
      els.ocrBtn.disabled=true; els.ocrStatus.textContent="OCR 辨識中...";
      try{ const processed=await preprocessImage(file); const result=await Tesseract.recognize(processed,"eng"); const n=extractNumericMetrics(result.data.text||""); if(n.distance!=null) els.distanceInput.value=n.distance.toFixed(2); if(n.hours!=null) els.hoursInput.value=n.hours; if(n.minutes!=null) els.minutesInput.value=n.minutes; if(n.steps!=null) els.stepsInput.value=n.steps; if(n.elevUp!=null) els.elevUpInput.value=n.elevUp; if(n.elevDown!=null) els.elevDownInput.value=n.elevDown; els.ocrStatus.textContent="辨識完成，可手動修正。"; }
      catch(err){ els.ocrStatus.textContent=`辨識失敗：${err.message}`; }
      finally{ els.ocrInput.value=""; els.ocrBtn.disabled=false; }
    }
    function preprocessImage(file){
      return new Promise((resolve,reject)=>{
        const img=new Image(); const fr=new FileReader(); fr.onload=()=>{ img.src=String(fr.result); }; fr.onerror=()=>reject(new Error("讀圖失敗"));
        img.onload=()=>{ const canvas=document.createElement("canvas"); canvas.width=img.width; canvas.height=img.height; const ctx=canvas.getContext("2d"); ctx.drawImage(img,0,0); const data=ctx.getImageData(0,0,canvas.width,canvas.height); for(let i=0;i<data.data.length;i+=4){ const gray=data.data[i]*.299+data.data[i+1]*.587+data.data[i+2]*.114; const v=gray>145?255:0; data.data[i]=v; data.data[i+1]=v; data.data[i+2]=v; } ctx.putImageData(data,0,0); canvas.toBlob((blob)=>{ if(!blob) return reject(new Error("預處理失敗")); resolve(blob); },"image/png"); };
        img.onerror=()=>reject(new Error("載入圖片失敗")); fr.readAsDataURL(file);
      });
    }
    function extractNumericMetrics(text){
      const t=text.replace(/,/g," "); const get=(re)=>{ const m=t.match(re); return m?Number(m[1]):null; };
      const distance=get(/(\d+(?:\.\d{1,2})?)\s*km/i)??get(/distance[:\s]+(\d+(?:\.\d{1,2})?)/i); const steps=get(/steps?[:\s]+(\d+)/i); const elevUp=get(/(?:gain|ascent|elev(?:ation)?)[\s:]+(\d+)/i); const elevDown=get(/(?:descent|down)[\s:]+(\d+)/i);
      let hours=null; let minutes=null; const hm=t.match(/(\d{1,2})\s*h(?:ours?)?\s*(\d{1,2})\s*m/i); if(hm){ hours=Number(hm[1]); minutes=Number(hm[2]); } else { const onlyMin=get(/(\d{1,3})\s*min/i)??get(/time[:\s]+(\d{1,3})/i); if(onlyMin!=null){ hours=Math.floor(onlyMin/60); minutes=onlyMin%60; } }
      return { distance,hours,minutes,steps,elevUp,elevDown };
    }
    function renderStats(){
      const range=els.periodSelect.value; const list=collectByRange(range);
      const metrics={ 步數:list.reduce((a,r)=>a+Number(r.steps||0),0), 距離:list.reduce((a,r)=>a+Number(r.distance||0),0), 爬升:list.reduce((a,r)=>a+Number(r.elevUp||0),0), 負荷:list.reduce((a,r)=>a+Number(r.weight||0)*Number(r.sets||0)*Number(r.reps||0),0) };
      const max=Math.max(...Object.values(metrics),1); els.statsSummary.textContent=`筆數：${list.length}，期間：${rangeLabel(range)}`;
      els.chart.innerHTML=Object.entries(metrics).map(([k,v])=>{ const h=Math.max(6,(v/max)*180); return `<div class="bar-col"><div class="bar" style="height:${h}px"></div><div class="bar-val">${pretty(v,k)}</div><div class="bar-label">${k}</div></div>`; }).join("");
    }
    function collectByRange(range){ const now=new Date(); return Object.entries(state.records).filter(([k])=>inRange(fromDateKey(k),now,range)).flatMap(([,list])=>list); }
    function inRange(d,now,range){ if(range==="day") return toDateKey(d)===toDateKey(now); if(range==="month") return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth(); if(range==="quarter") return d.getFullYear()===now.getFullYear()&&Math.floor(d.getMonth()/3)===Math.floor(now.getMonth()/3); return d.getFullYear()===now.getFullYear(); }
    function rangeLabel(range){ return {day:"日",month:"月",quarter:"季",year:"年"}[range]; }
    function pretty(v,key){ if(key==="距離") return `${Number(v).toFixed(2)}km`; if(key==="爬升") return `${Number(v).toFixed(0)}m`; return Number(v).toLocaleString("zh-Hant"); }
    function exportBackup(){ const payload={records:state.records,gym:state.gym}; const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`workout-v30-${toDateKey(new Date())}.json`; a.click(); URL.revokeObjectURL(url); }
    async function importBackup(e){ const file=e.target.files?.[0]; if(!file) return; try{ const text=await file.text(); const parsed=JSON.parse(text); if(!parsed||typeof parsed!=="object") throw new Error("格式錯誤"); state.records=parsed.records&&typeof parsed.records==="object"?parsed.records:{}; state.gym=parsed.gym&&typeof parsed.gym==="object"?parsed.gym:structuredClone(DEFAULT_GYM); persist(STORAGE_KEY,state.records); persist(GYM_KEY,state.gym); renderGymSelectors(); renderCalendar(); renderStats(); alert("匯入完成"); } catch(err){ alert(`匯入失敗：${err.message}`); } finally{ e.target.value=""; } }
    function initManifest(){ const manifest={ name:"運動生活整合日曆 V3.0", short_name:"運動日曆V3", display:"standalone", start_url:".", background_color:"#0f172a", theme_color:"#0f172a", icons:[{ src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230f172a'/%3E%3Ccircle cx='96' cy='96' r='52' fill='%233b82f6'/%3E%3Cpath d='M66 96h60M96 66v60' stroke='white' stroke-width='12' stroke-linecap='round'/%3E%3C/svg%3E", sizes:"192x192", type:"image/svg+xml" }] }; const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/json"})); document.head.appendChild(link); }
    function persist(key,data){ localStorage.setItem(key,JSON.stringify(data)); }
    function loadJson(key,fallback){ try{ const raw=localStorage.getItem(key); const parsed=raw?JSON.parse(raw):fallback; return parsed&&typeof parsed==="object"?parsed:fallback; } catch { return fallback; } }
    function toDateKey(d){ const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,"0"); const day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
    function fromDateKey(key){ const [y,m,d]=key.split("-").map(Number); return new Date(y,m-1,d); }
    function num(v,fixed=null){ if(v===""||v==null) return null; const n=Number(v); if(!Number.isFinite(n)) return null; return fixed==null?n:Number(n.toFixed(fixed)); }
    function toFixed2(v){ if(v==null||Number.isNaN(Number(v))) return "0.00"; return Number(v).toFixed(2); }
    function escapeHtml(s){ return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;"); }
    init();
  </script>
