<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>運動生活整合日曆 V2.0</title>
  <style>
    :root { --bg:#f4f6fb; --panel:#fff; --text:#101826; --muted:#6e7891; --line:#dfe5f2; --accent:#2764ff; --run:#ef4444; --walk:#f59e0b; --hike:#2563eb; --lift:#7c3aed; --safe-bottom:calc(env(safe-area-inset-bottom) + 14px); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI","Noto Sans TC",system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    button,input,select,textarea { font:inherit; color:inherit; }
    .app-shell { max-width:820px; margin:0 auto; padding:calc(env(safe-area-inset-top) + 12px) 12px calc(var(--safe-bottom) + 74px); }
    .calendar-card { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:12px; box-shadow:0 12px 24px rgba(14,18,30,.08); }
    .month-bar { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .month-label { font-weight:700; font-size:1.05rem; }
    .icon-btn { width:34px; height:34px; border-radius:10px; border:1px solid var(--line); background:#f8faff; cursor:pointer; }
    .calendar-grid { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; }
    .dow { text-align:center; color:var(--muted); font-size:.78rem; padding:2px 0 4px; }
    .day { border:1px solid var(--line); border-radius:12px; min-height:86px; padding:5px; background:#fbfcff; cursor:pointer; display:flex; flex-direction:column; gap:4px; overflow:hidden; transition:transform .15s,border-color .2s; }
    .day:hover { transform:translateY(-1px); border-color:#bdd0ff; }
    .day.outside { opacity:.4; }
    .day.today { border:2px solid var(--accent); padding:4px; }
    .day-top { display:flex; align-items:center; justify-content:space-between; }
    .day-num { font-size:.78rem; font-weight:700; }
    .event-pack { display:flex; flex-wrap:wrap; gap:3px; align-content:flex-start; max-height:54px; overflow:hidden; }
    .event-chip { max-width:100%; display:inline-flex; align-items:center; gap:4px; font-size:.66rem; padding:1px 5px; border-radius:999px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .event-chip::before { content:""; width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.9); flex:0 0 auto; }
    .run{background:var(--run);} .walk{background:var(--walk);} .hike{background:var(--hike);} .lift{background:var(--lift);}
    .fab { position:fixed; right:16px; bottom:calc(var(--safe-bottom) + 4px); width:58px; height:58px; border:none; border-radius:50%; background:var(--accent); color:#fff; font-size:2rem; line-height:1; box-shadow:0 14px 28px rgba(39,100,255,.35); cursor:pointer; z-index:40; }
    .scrim { position:fixed; inset:0; background:rgba(4,7,14,.55); opacity:0; pointer-events:none; transition:opacity .2s; z-index:20; }
    .scrim.show { opacity:1; pointer-events:auto; }
    .sheet { position:fixed; left:0; right:0; bottom:0; background:var(--panel); border-top-left-radius:20px; border-top-right-radius:20px; border:1px solid var(--line); transform:translateY(105%); transition:transform .25s; z-index:25; max-height:75vh; overflow:auto; padding:14px 14px calc(var(--safe-bottom) + 6px); }
    .sheet.show { transform:translateY(0); }
    .sheet-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .summary-list { display:grid; gap:8px; }
    .summary-item { border:1px solid var(--line); border-radius:12px; padding:10px; background:#fafcff; display:grid; gap:4px; }
    .summary-meta { color:var(--muted); font-size:.84rem; }
    .cover { position:fixed; inset:0; background:#f8faff; z-index:35; display:none; overflow:auto; }
    .cover.show { display:block; }
    .cover-inner { max-width:780px; margin:0 auto; padding:calc(env(safe-area-inset-top) + 12px) 14px calc(var(--safe-bottom) + 16px); display:grid; gap:10px; }
    .cover-head { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .form-card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px; display:grid; gap:10px; }
    .field { display:grid; gap:4px; }
    .field > label { font-size:.86rem; color:var(--muted); }
    input,select,textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:8px; background:#fff; }
    textarea { min-height:72px; resize:vertical; }
    .grid-2 { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
    .stack-btn { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { border:1px solid var(--line); border-radius:10px; background:#f7f9ff; padding:8px 10px; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.warn { background:#d92042; border-color:#d92042; color:#fff; }
    .timer-launch { border:none; background:transparent; cursor:pointer; font-size:1.15rem; padding:0 2px; }
    .hidden { display:none !important; }
    .ocr-hint { font-size:.8rem; color:var(--muted); }
    .preview-image { width:100%; max-height:160px; object-fit:cover; border-radius:10px; border:1px solid var(--line); }
    .timer-modal { position:fixed; inset:0; z-index:50; background:rgba(6,10,18,.9); display:none; align-items:center; justify-content:center; padding:16px; }
    .timer-modal.show { display:flex; }
    .timer-box { width:min(520px,100%); background:#121a2d; border:1px solid #304164; border-radius:18px; padding:18px; color:#eef3ff; display:grid; gap:12px; }
    .timer-value { font-size:clamp(2.8rem,13vw,5.4rem); text-align:center; font-weight:800; letter-spacing:.05em; }
    .flash { animation:pulseFlash .2s linear 10; }
    @keyframes pulseFlash { 0%{background:rgba(6,10,18,.9);} 50%{background:rgba(255,59,59,.98);} 100%{background:rgba(6,10,18,.9);} }
    @media (max-width:640px) { .app-shell{padding-left:8px;padding-right:8px;} .day{min-height:72px;} .grid-2{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="calendar-card">
      <div class="month-bar">
        <button id="prevMonthBtn" class="icon-btn" type="button" aria-label="上個月">◀</button>
        <div id="monthLabel" class="month-label"></div>
        <button id="nextMonthBtn" class="icon-btn" type="button" aria-label="下個月">▶</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>
  </main>

  <button id="fabBtn" class="fab" type="button" aria-label="新增運動">＋</button>
  <div id="scrim" class="scrim"></div>

  <section id="daySheet" class="sheet" aria-hidden="true">
    <div class="sheet-head">
      <strong id="sheetTitle">當日摘要</strong>
      <button id="closeSheetBtn" class="btn" type="button">關閉</button>
    </div>
    <div id="summaryList" class="summary-list"></div>
  </section>

  <section id="addCover" class="cover" aria-hidden="true">
    <div class="cover-inner">
      <div class="cover-head">
        <strong>新增運動</strong>
        <button id="closeCoverBtn" class="btn" type="button">關閉</button>
      </div>
      <form id="entryForm" class="form-card">
        <div class="field"><label for="recordDate">日期</label><input id="recordDate" type="date" required /></div>
        <div class="field">
          <label for="type">運動類型</label>
          <select id="type" required>
            <option value="run">跑步</option><option value="walk">散步</option><option value="hike">登山</option><option value="lift">重訓</option>
          </select>
        </div>
        <div class="field"><label for="title">標題</label><input id="title" maxlength="42" placeholder="例如：晚間節奏跑 / 胸推訓練" required /></div>
        <div class="field"><label for="content">備註</label><textarea id="content" placeholder="記錄感受、路線、恢復狀態"></textarea></div>

        <div class="field">
          <label for="imageUpload">圖片上傳</label>
          <input id="imageUpload" type="file" accept="image/*" />
          <img id="imagePreview" class="preview-image hidden" alt="運動截圖預覽" />
          <div class="stack-btn"><button id="ocrBtn" class="btn" type="button">自動辨識截圖</button><span id="ocrStatus" class="ocr-hint">可先上傳截圖，再執行辨識。</span></div>
        </div>

        <div id="outdoorFields" class="grid-2">
          <div class="field"><label for="distance">距離 (km)</label><input id="distance" type="number" min="0" step="0.1" /></div>
          <div class="field"><label for="duration">時間 (分鐘)</label><input id="duration" type="number" min="0" step="1" /></div>
          <div class="field"><label for="elevationUp">上升 (m)</label><input id="elevationUp" type="number" min="0" step="1" /></div>
          <div class="field"><label for="elevationDown">下降 (m)</label><input id="elevationDown" type="number" min="0" step="1" /></div>
          <div id="stepsField" class="field hidden"><label for="steps">走路步數</label><input id="steps" type="number" min="0" step="1" /></div>
        </div>

        <div id="liftFields" class="grid-2 hidden">
          <div class="field"><label for="bodyPart">部位</label><select id="bodyPart"></select></div>
          <div class="field"><label for="exercise">動作</label><select id="exercise"></select></div>
          <div class="field"><label for="weight">重量 (kg)</label><input id="weight" type="number" min="0" step="0.5" /></div>
          <div class="field"><label for="setsReps">組數 / 次數</label><input id="setsReps" placeholder="例如 4 x 8" /></div>
          <div class="field"><label for="restSec">休息倒數秒數</label><input id="restSec" type="number" min="1" step="1" value="90" /></div>
          <div class="field"><label>休息計時器 <button id="openTimerBtn" class="timer-launch" type="button" title="開啟計時器">⏱</button></label><input value="點擊馬錶圖示開啟大型倒數視窗" readonly /></div>
        </div>

        <div class="stack-btn"><button class="btn primary" type="submit">儲存紀錄</button><button id="resetFormBtn" class="btn" type="button">清空</button></div>
      </form>
    </div>
  </section>

  <section id="timerModal" class="timer-modal" aria-hidden="true">
    <div class="timer-box">
      <div class="cover-head"><strong>休息倒數</strong><button id="closeTimerBtn" class="btn" type="button">關閉</button></div>
      <div id="timerValue" class="timer-value">01:30</div>
      <div class="grid-2">
        <button class="btn" data-timer-sec="60" type="button">60 秒</button>
        <button class="btn" data-timer-sec="90" type="button">90 秒</button>
        <button class="btn" data-timer-sec="120" type="button">120 秒</button>
        <button id="startTimerBtn" class="btn primary" type="button">開始</button>
      </div>
      <button id="stopTimerBtn" class="btn warn" type="button">停止</button>
    </div>
  </section>

  <script>
    const STORAGE_KEY = "workout_life_calendar_v2";
    const DAY_NAMES = ["日", "一", "二", "三", "四", "五", "六"];
    const GYM_LIBRARY = { 胸:["臥推","上斜啞鈴推","飛鳥"], 背:["引體向上","划船","硬舉"], 腿:["深蹲","腿推","弓箭步"], 肩:["肩推","側平舉","前平舉"], 手臂:["二頭彎舉","三頭下壓","槌式彎舉"], 核心:["平板撐","捲腹","懸垂抬腿"] };
    const state = { cursorDate:new Date(), selectedDateKey:toDateKey(new Date()), records:loadRecords(), timerLeft:90, timerId:null, uploadedImageData:null };
    const els = {
      calendarGrid:document.getElementById("calendarGrid"), monthLabel:document.getElementById("monthLabel"), prevMonthBtn:document.getElementById("prevMonthBtn"), nextMonthBtn:document.getElementById("nextMonthBtn"),
      fabBtn:document.getElementById("fabBtn"), scrim:document.getElementById("scrim"), daySheet:document.getElementById("daySheet"), sheetTitle:document.getElementById("sheetTitle"), summaryList:document.getElementById("summaryList"),
      closeSheetBtn:document.getElementById("closeSheetBtn"), addCover:document.getElementById("addCover"), closeCoverBtn:document.getElementById("closeCoverBtn"), entryForm:document.getElementById("entryForm"), recordDate:document.getElementById("recordDate"),
      type:document.getElementById("type"), title:document.getElementById("title"), content:document.getElementById("content"), outdoorFields:document.getElementById("outdoorFields"), distance:document.getElementById("distance"), duration:document.getElementById("duration"),
      elevationUp:document.getElementById("elevationUp"), elevationDown:document.getElementById("elevationDown"), stepsField:document.getElementById("stepsField"), steps:document.getElementById("steps"), liftFields:document.getElementById("liftFields"),
      bodyPart:document.getElementById("bodyPart"), exercise:document.getElementById("exercise"), weight:document.getElementById("weight"), setsReps:document.getElementById("setsReps"), restSec:document.getElementById("restSec"),
      openTimerBtn:document.getElementById("openTimerBtn"), resetFormBtn:document.getElementById("resetFormBtn"), imageUpload:document.getElementById("imageUpload"), imagePreview:document.getElementById("imagePreview"), ocrBtn:document.getElementById("ocrBtn"),
      ocrStatus:document.getElementById("ocrStatus"), timerModal:document.getElementById("timerModal"), timerValue:document.getElementById("timerValue"), startTimerBtn:document.getElementById("startTimerBtn"), closeTimerBtn:document.getElementById("closeTimerBtn"), stopTimerBtn:document.getElementById("stopTimerBtn")
    };

    function init() { renderGymLibrary(); bindEvents(); els.recordDate.value = state.selectedDateKey; syncVisibleFields(); renderCalendar(); updateTimerUI(); }
    function bindEvents() {
      els.prevMonthBtn.addEventListener("click", () => { state.cursorDate = new Date(state.cursorDate.getFullYear(), state.cursorDate.getMonth() - 1, 1); renderCalendar(); });
      els.nextMonthBtn.addEventListener("click", () => { state.cursorDate = new Date(state.cursorDate.getFullYear(), state.cursorDate.getMonth() + 1, 1); renderCalendar(); });
      els.fabBtn.addEventListener("click", () => { els.recordDate.value = state.selectedDateKey; openAddCover(); });
      els.closeCoverBtn.addEventListener("click", closeAddCover); els.closeSheetBtn.addEventListener("click", closeDaySheet);
      els.scrim.addEventListener("click", () => { closeDaySheet(); closeAddCover(); });
      els.type.addEventListener("change", syncVisibleFields); els.bodyPart.addEventListener("change", fillExerciseOptions); els.exercise.addEventListener("change", autofillFromLastLift);
      els.imageUpload.addEventListener("change", handleImageUpload); els.ocrBtn.addEventListener("click", simulateOCR);
      els.entryForm.addEventListener("submit", (event) => { event.preventDefault(); saveEntry(); });
      els.resetFormBtn.addEventListener("click", resetForm);
      els.openTimerBtn.addEventListener("click", openTimerModal); els.closeTimerBtn.addEventListener("click", closeTimerModal);
      els.startTimerBtn.addEventListener("click", () => startTimer(Number(els.restSec.value) || 90)); els.stopTimerBtn.addEventListener("click", stopTimer);
      document.querySelectorAll("[data-timer-sec]").forEach((btn) => btn.addEventListener("click", () => { els.restSec.value = String(btn.dataset.timerSec); state.timerLeft = Number(btn.dataset.timerSec); updateTimerUI(); }));
    }

    function renderCalendar() {
      const year = state.cursorDate.getFullYear(); const month = state.cursorDate.getMonth();
      els.monthLabel.textContent = `${year} 年 ${month + 1} 月`; els.calendarGrid.innerHTML = "";
      DAY_NAMES.forEach((name) => { const dow = document.createElement("div"); dow.className = "dow"; dow.textContent = name; els.calendarGrid.appendChild(dow); });
      const firstDay = new Date(year, month, 1); const startWeekday = firstDay.getDay(); const monthDays = new Date(year, month + 1, 0).getDate(); const prevMonthDays = new Date(year, month, 0).getDate();
      for (let i = 0; i < 42; i += 1) {
        let dateObj; let dayNum; const day = document.createElement("button"); day.type = "button"; day.className = "day";
        if (i < startWeekday) { dayNum = prevMonthDays - startWeekday + i + 1; dateObj = new Date(year, month - 1, dayNum); day.classList.add("outside"); }
        else if (i >= startWeekday + monthDays) { dayNum = i - startWeekday - monthDays + 1; dateObj = new Date(year, month + 1, dayNum); day.classList.add("outside"); }
        else { dayNum = i - startWeekday + 1; dateObj = new Date(year, month, dayNum); }
        const key = toDateKey(dateObj); const records = state.records[key] || []; if (key === toDateKey(new Date())) day.classList.add("today");
        const top = document.createElement("div"); top.className = "day-top"; top.innerHTML = `<span class="day-num">${dayNum}</span>`;
        const pack = document.createElement("div"); pack.className = "event-pack";
        records.slice(0, 3).forEach((record) => { const chip = document.createElement("span"); chip.className = `event-chip ${record.type}`; chip.textContent = record.title || typeLabel(record.type); pack.appendChild(chip); });
        if (records.length > 3) { const more = document.createElement("span"); more.className = "event-chip"; more.style.background = "#8691ad"; more.textContent = `+${records.length - 3}`; pack.appendChild(more); }
        day.appendChild(top); day.appendChild(pack); day.addEventListener("click", () => openDaySummary(key, dateObj)); els.calendarGrid.appendChild(day);
      }
    }

    function openDaySummary(dateKey, dateObj) { state.selectedDateKey = dateKey; state.cursorDate = new Date(dateObj.getFullYear(), dateObj.getMonth(), 1); els.recordDate.value = dateKey; renderCalendar(); renderSummary(dateKey); els.scrim.classList.add("show"); els.daySheet.classList.add("show"); els.daySheet.setAttribute("aria-hidden", "false"); }
    function closeDaySheet() { els.daySheet.classList.remove("show"); els.daySheet.setAttribute("aria-hidden", "true"); if (!els.addCover.classList.contains("show")) els.scrim.classList.remove("show"); }
    function renderSummary(dateKey) {
      const [y, m, d] = dateKey.split("-").map(Number); els.sheetTitle.textContent = `${y}/${m}/${d} 運動摘要`; const records = state.records[dateKey] || [];
      if (!records.length) { els.summaryList.innerHTML = `<div class="summary-item">當天尚無運動紀錄</div>`; return; }
      els.summaryList.innerHTML = records.map((record) => {
        const meta = [];
        if (record.type === "lift") { if (record.bodyPart) meta.push(`部位 ${escapeHtml(record.bodyPart)}`); if (record.exercise) meta.push(`動作 ${escapeHtml(record.exercise)}`); if (record.weight != null) meta.push(`重量 ${record.weight}kg`); if (record.setsReps) meta.push(`組次 ${escapeHtml(record.setsReps)}`); }
        else { if (record.distance != null) meta.push(`距離 ${record.distance}km`); if (record.duration != null) meta.push(`時間 ${record.duration} 分`); if (record.elevationUp != null) meta.push(`上升 ${record.elevationUp}m`); if (record.elevationDown != null) meta.push(`下降 ${record.elevationDown}m`); if (record.steps != null) meta.push(`步數 ${record.steps} 步`); }
        const imageHtml = record.imageDataUrl ? `<img class="preview-image" src="${record.imageDataUrl}" alt="運動圖片" />` : "";
        return `<article class="summary-item"><strong>${escapeHtml(record.title || "未命名")} (${typeLabel(record.type)})</strong><div>${escapeHtml(record.content || "無備註")}</div><div class="summary-meta">${meta.join(" | ") || "—"}</div>${imageHtml}</article>`;
      }).join("");
    }
    function openAddCover() { closeDaySheet(); els.scrim.classList.add("show"); els.addCover.classList.add("show"); els.addCover.setAttribute("aria-hidden", "false"); }
    function closeAddCover() { els.addCover.classList.remove("show"); els.addCover.setAttribute("aria-hidden", "true"); if (!els.daySheet.classList.contains("show")) els.scrim.classList.remove("show"); }
    function syncVisibleFields() { const isLift = els.type.value === "lift"; const isWalk = els.type.value === "walk"; els.liftFields.classList.toggle("hidden", !isLift); els.outdoorFields.classList.toggle("hidden", isLift); els.stepsField.classList.toggle("hidden", !isWalk); if (isLift) autofillFromLastLift(); }
    function saveEntry() {
      const dateKey = els.recordDate.value; if (!dateKey) return alert("請選擇日期");
      const payload = { id: crypto.randomUUID(), type: els.type.value, title: els.title.value.trim(), content: els.content.value.trim(), imageDataUrl: state.uploadedImageData, createdAt: Date.now() };
      if (!payload.title) return alert("請輸入標題");
      if (payload.type === "lift") { payload.bodyPart = els.bodyPart.value; payload.exercise = els.exercise.value; payload.weight = normalizeNumber(els.weight.value); payload.setsReps = els.setsReps.value.trim(); }
      else { payload.distance = normalizeNumber(els.distance.value); payload.duration = normalizeNumber(els.duration.value); payload.elevationUp = normalizeNumber(els.elevationUp.value); payload.elevationDown = normalizeNumber(els.elevationDown.value); payload.steps = payload.type === "walk" ? normalizeNumber(els.steps.value) : null; }
      if (!state.records[dateKey]) state.records[dateKey] = []; state.records[dateKey].unshift(payload); persistRecords();
      state.selectedDateKey = dateKey; renderCalendar(); renderSummary(dateKey); closeAddCover(); openDaySummary(dateKey, fromDateKey(dateKey)); resetForm();
    }
    function resetForm() { els.entryForm.reset(); els.recordDate.value = state.selectedDateKey; state.uploadedImageData = null; els.imagePreview.src = ""; els.imagePreview.classList.add("hidden"); els.ocrStatus.textContent = "可先上傳截圖，再執行辨識。"; renderGymLibrary(); syncVisibleFields(); }
    function renderGymLibrary() { els.bodyPart.innerHTML = Object.keys(GYM_LIBRARY).map((part) => `<option value="${part}">${part}</option>`).join(""); fillExerciseOptions(); }
    function fillExerciseOptions() { const part = els.bodyPart.value || Object.keys(GYM_LIBRARY)[0]; const exercises = GYM_LIBRARY[part] || []; els.exercise.innerHTML = exercises.map((item) => `<option value="${item}">${item}</option>`).join(""); autofillFromLastLift(); }
    function autofillFromLastLift() { if (els.type.value !== "lift") return; const targetExercise = (els.exercise.value || "").trim(); if (!targetExercise) return; const latest = findLastLift(targetExercise); if (!latest) return; if (latest.weight != null) els.weight.value = latest.weight; if (latest.setsReps) els.setsReps.value = latest.setsReps; if (latest.bodyPart) els.bodyPart.value = latest.bodyPart; }
    function findLastLift(exerciseName) { const all = Object.values(state.records).flat(); return all.filter((record) => record.type === "lift" && (record.exercise || "").trim() === exerciseName).sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0))[0] || null; }
    function handleImageUpload(event) { const file = event.target.files?.[0]; if (!file) return; const reader = new FileReader(); reader.onload = () => { state.uploadedImageData = String(reader.result || ""); els.imagePreview.src = state.uploadedImageData; els.imagePreview.classList.remove("hidden"); }; reader.readAsDataURL(file); }
    function simulateOCR() {
      if (!state.uploadedImageData) { alert("請先上傳圖片再辨識"); return; }
      els.ocrBtn.disabled = true; els.ocrStatus.textContent = "正在辨識數據...";
      setTimeout(() => {
        const kind = els.type.value;
        if (kind === "run") { els.distance.value = "6.2"; els.duration.value = "38"; }
        else if (kind === "walk") { els.distance.value = "3.5"; els.duration.value = "42"; els.steps.value = "5200"; }
        else if (kind === "hike") { els.distance.value = "8.4"; els.duration.value = "155"; els.elevationUp.value = "650"; els.elevationDown.value = "640"; }
        else { els.weight.value = "60"; els.setsReps.value = "4 x 8"; }
        els.ocrStatus.textContent = "辨識完成（模擬資料），可手動調整後儲存。"; els.ocrBtn.disabled = false;
      }, 1200);
    }
    function openTimerModal() { state.timerLeft = Number(els.restSec.value) || 90; updateTimerUI(); els.timerModal.classList.add("show"); els.timerModal.setAttribute("aria-hidden", "false"); }
    function closeTimerModal() { els.timerModal.classList.remove("show"); els.timerModal.setAttribute("aria-hidden", "true"); }
    function startTimer(seconds) { stopTimer(); state.timerLeft = Math.max(1, Math.floor(seconds)); updateTimerUI(); state.timerId = setInterval(() => { state.timerLeft -= 1; updateTimerUI(); if (state.timerLeft <= 0) { stopTimer(); alarmTimer(); } }, 1000); }
    function stopTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }
    function updateTimerUI() { els.timerValue.textContent = formatTime(state.timerLeft); }
    function alarmTimer() { els.timerModal.classList.add("flash"); playBeepPattern(); setTimeout(() => els.timerModal.classList.remove("flash"), 2200); }
    function playBeepPattern() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)(); const base = ctx.currentTime;
        [0, .3, .6, .9].forEach((offset) => { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = "square"; osc.frequency.value = 980; osc.connect(gain); gain.connect(ctx.destination); gain.gain.setValueAtTime(.001, base + offset); gain.gain.exponentialRampToValueAtTime(.35, base + offset + .02); gain.gain.exponentialRampToValueAtTime(.001, base + offset + .2); osc.start(base + offset); osc.stop(base + offset + .22); });
      } catch { alert("休息時間結束！"); }
    }
    function persistRecords() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records)); }
    function loadRecords() { try { const raw = localStorage.getItem(STORAGE_KEY); const parsed = raw ? JSON.parse(raw) : {}; return parsed && typeof parsed === "object" ? parsed : {}; } catch { return {}; } }
    function toDateKey(date) { const y = date.getFullYear(); const m = String(date.getMonth() + 1).padStart(2, "0"); const d = String(date.getDate()).padStart(2, "0"); return `${y}-${m}-${d}`; }
    function fromDateKey(key) { const [y, m, d] = key.split("-").map(Number); return new Date(y, m - 1, d); }
    function normalizeNumber(value) { if (value === "" || value == null) return null; const n = Number(value); return Number.isFinite(n) ? n : null; }
    function formatTime(sec) { const m = Math.floor(sec / 60); const s = sec % 60; return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`; }
    function typeLabel(type) { return { run:"跑步", walk:"散步", hike:"登山", lift:"重訓" }[type] || type; }
    function escapeHtml(str) { return String(str).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;"); }
    init();
  </script>
</body>
