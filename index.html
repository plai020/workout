<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>運動生活整合日曆</title>
    <link rel="apple-touch-icon" href="https://duk.tw/ohlo4D.png">
    <link rel="icon" href="https://duk.tw/ohlo4D.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="light-mode">
    <header>
        <button id="theme-toggle" class="icon-btn circular">🌓</button>
    </header>

    <main id="app-content">
        <section id="calendar-view" class="view-section active">
            <div id="calendar-header">
                <button id="prev-month" class="month-nav-btn">＜</button>
                <h2 id="current-month-year"></h2>
                <button id="next-month" class="month-nav-btn">＞</button>
            </div>
            <div id="calendar-grid"></div>
            <div id="day-detail-panel" class="hidden">
                <div class="panel-header">
                    <h3>運動明細</h3>
                    <button onclick="closeDetail()" class="close-overlay">✕</button>
                </div>
                <div id="detail-list"></div>
            </div>
        </section>

        <section id="add-view" class="view-section overlay">
            <button class="close-overlay" onclick="closeOverlay('add-view')">✕</button>
            <h2>新增運動紀錄</h2>
            <div class="type-selector">
                <button class="type-btn" data-type="run" style="background:#FF5252"><span class="emoji">👟</span><br><span class="label">跑步</span></button>
                <button class="type-btn" data-type="walk" style="background:#FFD740"><span class="emoji">👣</span><br><span class="label">散步</span></button>
                <button class="type-btn" data-type="climb" style="background:#448AFF"><span class="emoji">🏔️</span><br><span class="label">登山</span></button>
                <button class="type-btn" data-type="gym" style="background:#B388FF"><span class="emoji">💪</span><br><span class="label">重訓</span></button>
            </div>
            <form id="workout-form" class="hidden">
                <div id="form-fields"></div>
                <div class="ocr-section">
                    <input type="file" id="ocr-upload" accept="image/*" hidden>
                    <div class="ocr-actions">
                        <button type="button" class="ocr-btn" onclick="document.getElementById('ocr-upload').click()">📷 截圖辨識數字</button>
                        <button type="button" class="clear-ocr-btn" onclick="clearFormInputs()">🗑️ 清空輸入</button>
                    </div>
                    <p id="ocr-status"></p>
                </div>
                <button type="submit" class="save-btn">儲存運動紀錄</button>
            </form>
        </section>

        <section id="manage-view" class="view-section overlay">
            <button class="close-overlay" onclick="closeOverlay('manage-view')">✕</button>
            <h2>管理重訓項目</h2>
            <div class="admin-input-group">
                <input type="text" id="new-part" placeholder="部位 (如:胸)">
                <input type="text" id="new-action" placeholder="動作 (如:臥推)">
                <button onclick="addGymAction()" class="manage-action-btn">新增動作</button>
            </div>
            <div id="gym-manage-container"></div>
        </section>

        <section id="stats-view" class="view-section overlay">
            <button class="close-overlay" onclick="closeOverlay('stats-view')">✕</button>
            <h2>統計中心</h2>
            <div class="filter-bar">
                <div class="date-inputs">
                    <input type="date" id="stat-start">
                    <span>至</span>
                    <input type="date" id="stat-end">
                </div>
                <select id="stat-period">
                    <option value="day">日報</option>
                    <option value="month">月報</option>
                    <option value="year">年報</option>
                </select>
                <button onclick="updateCharts()" class="refresh-btn">更新圖表</button>
            </div>
            <div class="charts-scroll-area">
                <canvas id="stepsChart"></canvas>
                <canvas id="distChart"></canvas>
                <canvas id="climbChart"></canvas>
                <canvas id="gymChart"></canvas>
            </div>
        </section>

        <section id="backup-view" class="view-section overlay">
            <button class="close-overlay" onclick="closeOverlay('backup-view')">✕</button>
            <h2>資料備份</h2>
            <div class="backup-options">
                <button onclick="exportData()" class="backup-btn">💾 匯出資料 (JSON)</button>
                <input type="file" id="import-file" hidden>
                <button onclick="document.getElementById('import-file').click()" class="backup-btn">📂 匯入資料</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item" data-target="add-view">➕<br>新增</button>
        <button class="nav-item" data-target="manage-view">⚙️<br>管理</button>
        <button class="nav-item" data-target="stats-view">📊<br>統計</button>
        <button class="nav-item" data-target="backup-view">💾<br>備份</button>
    </nav>

    <div id="timer-modal" class="modal">
        <h2 id="timer-display">00:00</h2>
        <div class="timer-presets">
            <button onclick="startTimer(30)">30s</button>
            <button onclick="startTimer(60)">60s</button>
            <button onclick="startTimer(90)">90s</button>
            <button onclick="startTimer(120)">120s</button>
        </div>
        <div class="timer-custom-input">
            <input type="number" id="manual-timer-sec" placeholder="輸入秒數 (如: 45)">
            <button onclick="startTimer(document.getElementById('manual-timer-sec').value)" class="manual-timer-btn">啟動</button>
        </div>
        <button onclick="closeTimer()" class="close-timer-btn">結束並關閉</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
