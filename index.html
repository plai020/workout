<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>運動生活整合日曆 V2.6</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe4f1;
      --accent: #2563eb;
      --safe-bottom: calc(env(safe-area-inset-bottom) + 14px);
      --safe-top: calc(env(safe-area-inset-top) + 12px);
      --run: #ef4444;
      --walk: #f59e0b;
      --hike: #2563eb;
      --lift: #7c3aed;
      --timer-dark: #13213d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: var(--safe-top) 10px calc(var(--safe-bottom) + 76px);
    }

    .calendar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
      padding: 10px;
    }

    .month-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .month-label {
      font-size: 1.04rem;
      font-weight: 700;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f8fbff;
      cursor: pointer;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .dow {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      padding: 2px 0;
    }

    .day {
      border: 1px solid var(--line);
      border-radius: 12px;
      min-height: 86px;
      padding: 5px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
      background: #fdfefe;
      transition: transform .16s, border-color .2s;
    }

    .day:hover {
      transform: translateY(-1px);
      border-color: #abc4ff;
    }

    .day.outside { opacity: 0.4; }
    .day.today { border: 2px solid var(--accent); padding: 4px; }

    .day-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .merged {
      display: grid;
      gap: 2px;
      overflow: hidden;
      max-height: 54px;
      font-size: 0.66rem;
    }

    .merged-item {
      color: #fff;
      border-radius: 999px;
      padding: 1px 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .run { background: var(--run); }
    .walk { background: var(--walk); }
    .hike { background: var(--hike); }
    .lift { background: var(--lift); }

    .fab {
      position: fixed;
      right: 16px;
      bottom: calc(var(--safe-bottom) + 2px);
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 2rem;
      line-height: 1;
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.35);
      cursor: pointer;
      z-index: 50;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 20;
    }

    .scrim.show {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 80vh;
      background: var(--panel);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      border: 1px solid var(--line);
      transform: translateY(110%);
      transition: transform .25s;
      z-index: 30;
      overflow: auto;
      padding: 14px;
    }

    .sheet.show { transform: translateY(0); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .cards {
      display: grid;
      gap: 8px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fbfdff;
      display: grid;
      gap: 4px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .btn {
      border: 1px solid var(--line);
      background: #f7f9fd;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.danger {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }

    .cover {
      position: fixed;
      inset: 0;
      background: #f5f8fe;
      z-index: 40;
      display: none;
      overflow: auto;
    }

    .cover.show { display: block; }

    .cover-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: var(--safe-top) 12px calc(var(--safe-bottom) + 12px);
      display: grid;
      gap: 10px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--line);
      background: #f3f7ff;
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .tab.active {
      background: #dce9ff;
      border-color: #b7d0ff;
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .hidden { display: none !important; }

    .field {
      display: grid;
      gap: 4px;
    }

    .field > label {
      color: var(--muted);
      font-size: 0.86rem;
    }

    input, select, textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      width: 100%;
    }

    textarea { min-height: 72px; resize: vertical; }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .gym-list {
      display: grid;
      gap: 8px;
      max-height: 250px;
      overflow: auto;
    }

    .gym-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fbfdff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .timer-btn {
      border: 1px solid #23395f;
      background: var(--timer-dark);
      color: #fff;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }

    .timer-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5, 8, 18, 0.75);
      padding: 16px;
    }

    .timer-modal.show { display: flex; }

    .timer-box {
      width: min(520px, 100%);
      background: #111d35;
      border: 1px solid #29436f;
      border-radius: 16px;
      padding: 16px;
      color: #f5f9ff;
      display: grid;
      gap: 10px;
    }

    .timer-value {
      text-align: center;
      font-size: clamp(2.8rem, 13vw, 5.2rem);
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .timer-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .breathing-alert {
      animation: breathe 1.1s ease-in-out 5;
    }

    @keyframes breathe {
      0% { box-shadow: 0 0 0 0 rgba(250, 173, 173, 0.08); background: rgba(250, 173, 173, 0.06); }
      50% { box-shadow: 0 0 0 14px rgba(250, 173, 173, 0.2); background: rgba(250, 173, 173, 0.32); }
      100% { box-shadow: 0 0 0 0 rgba(250, 173, 173, 0.08); background: rgba(250, 173, 173, 0.06); }
    }

    @media (max-width: 700px) {
      .grid-3 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      .day { min-height: 74px; }
      .timer-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <main class="app">
    <section class="calendar">
      <div class="month-bar">
        <button id="prevMonthBtn" class="icon-btn" type="button">◀</button>
        <div id="monthLabel" class="month-label"></div>
        <button id="nextMonthBtn" class="icon-btn" type="button">▶</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>
  </main>

  <button id="fabBtn" class="fab" type="button" aria-label="新增運動">＋</button>
  <div id="scrim" class="scrim"></div>

  <section id="daySheet" class="sheet">
    <div class="row">
      <strong id="sheetTitle">當日運動</strong>
      <button id="closeSheetBtn" class="btn" type="button">關閉</button>
    </div>
    <div id="sheetCards" class="cards"></div>
  </section>

  <section id="appCover" class="cover">
    <div class="cover-inner">
      <div class="row">
        <strong>運動生活整合日曆 V2.6</strong>
        <button id="closeCoverBtn" class="btn" type="button">關閉</button>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="entry" type="button">新增運動</button>
        <button class="tab" data-tab="gym" type="button">Gym 管理</button>
        <button class="tab" data-tab="analytics" type="button">統計中心</button>
        <button class="tab" data-tab="backup" type="button">備份匯入</button>
      </div>

      <section id="tab-entry" class="panel">
        <form id="entryForm" class="grid-2">
          <div class="field">
            <label for="recordDate">日期</label>
            <input id="recordDate" type="date" required />
          </div>
          <div class="field">
            <label for="type">運動類型</label>
            <select id="type" required>
              <option value="run">跑步</option>
              <option value="walk">散步</option>
              <option value="hike">登山</option>
              <option value="lift">重訓</option>
            </select>
          </div>
          <div class="field">
            <label for="title">標題</label>
            <input id="title" maxlength="48" required />
          </div>
          <div class="field">
            <label for="content">備註</label>
            <textarea id="content"></textarea>
          </div>

          <div id="ocrArea" class="field">
            <label for="ocrInput">上傳截圖辨識</label>
            <input id="ocrInput" type="file" accept="image/*" />
            <button id="ocrBtn" class="btn" type="button">開始 OCR 辨識</button>
            <div id="ocrStatus" class="meta">僅提取數字，不儲存圖片。</div>
          </div>

          <div id="outdoorFields" class="grid-3">
            <div class="field"><label for="distance">距離 (km)</label><input id="distance" type="number" min="0" step="0.1" /></div>
            <div class="field"><label for="duration">時間 (分鐘)</label><input id="duration" type="number" min="0" step="1" /></div>
            <div class="field"><label for="steps">步數</label><input id="steps" type="number" min="0" step="1" /></div>
            <div class="field"><label for="elevationUp">爬升 (m)</label><input id="elevationUp" type="number" min="0" step="1" /></div>
            <div class="field"><label for="elevationDown">下降 (m)</label><input id="elevationDown" type="number" min="0" step="1" /></div>
          </div>

          <div id="liftFields" class="grid-3 hidden">
            <div class="field"><label for="bodyPart">部位</label><select id="bodyPart"></select></div>
            <div class="field"><label for="exercise">動作</label><select id="exercise"></select></div>
            <div class="field"><label for="weight">重量 (kg)</label><input id="weight" type="number" min="0" step="0.5" /></div>
            <div class="field"><label for="sets">組數</label><input id="sets" type="number" min="0" step="1" /></div>
            <div class="field"><label for="reps">次數</label><input id="reps" type="number" min="0" step="1" /></div>
            <div class="field">
              <label for="restSec">休息秒數</label>
              <div style="display:flex; gap:8px;">
                <input id="restSec" type="number" min="1" step="1" value="90" />
                <button id="openTimerBtn" class="btn" type="button">⏱</button>
              </div>
            </div>
          </div>

          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn primary" type="submit">儲存紀錄</button>
            <button id="resetEntryBtn" class="btn" type="button">清空</button>
          </div>
        </form>
      </section>

      <section id="tab-gym" class="panel hidden">
        <div class="grid-2">
          <div class="field">
            <label for="gymPartSelect">部位</label>
            <select id="gymPartSelect"></select>
          </div>
          <div class="field">
            <label for="newPart">新增 / 編輯部位</label>
            <div style="display:flex; gap:8px;">
              <input id="newPart" placeholder="輸入部位名稱" />
              <button id="savePartBtn" class="btn" type="button">儲存</button>
              <button id="deletePartBtn" class="btn danger" type="button">刪除</button>
            </div>
          </div>
        </div>
        <div class="field">
          <label for="newExercise">新增動作</label>
          <div style="display:flex; gap:8px;">
            <input id="newExercise" placeholder="例如：槓鈴划船" />
            <button id="addExerciseBtn" class="btn" type="button">新增</button>
          </div>
        </div>
        <div id="exerciseList" class="gym-list"></div>
      </section>

      <section id="tab-analytics" class="panel hidden">
        <div class="grid-2">
          <div class="field">
            <label for="analyticsRange">報表區間</label>
            <select id="analyticsRange">
              <option value="day">日報</option>
              <option value="month">月報</option>
              <option value="quarter">季報</option>
              <option value="year">年報</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button id="refreshAnalyticsBtn" class="btn" type="button">刷新統計</button>
          </div>
        </div>
        <div id="analyticsCards" class="cards"></div>
      </section>

      <section id="tab-backup" class="panel hidden">
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button id="exportBtn" class="btn" type="button">匯出備份 JSON</button>
          <button id="importBtn" class="btn" type="button">匯入資料 JSON</button>
          <input id="importFile" class="hidden" type="file" accept="application/json" />
        </div>
        <div class="meta">只儲存純文字與數值欄位，不保存圖片。</div>
      </section>
    </div>
  </section>

  <section id="timerModal" class="timer-modal">
    <div id="timerBox" class="timer-box">
      <div class="row">
        <strong>休息計時器</strong>
        <button id="closeTimerBtn" class="timer-btn" type="button">關閉</button>
      </div>
      <div id="timerValue" class="timer-value">01:30</div>
      <div class="timer-grid">
        <button class="timer-btn quick-time" data-sec="30" type="button">30s</button>
        <button class="timer-btn quick-time" data-sec="60" type="button">60s</button>
        <button class="timer-btn quick-time" data-sec="90" type="button">90s</button>
        <button class="timer-btn quick-time" data-sec="120" type="button">120s</button>
      </div>
      <div class="timer-grid">
        <button id="startTimerBtn" class="timer-btn" type="button">開始</button>
        <button id="stopTimerBtn" class="timer-btn" type="button">停止</button>
      </div>
    </div>
  </section>

  <script>
    const STORAGE_KEY = "workout_calendar_v26_records";
    const GYM_KEY = "workout_calendar_v26_gym_library";
    const DAY_NAMES = ["日", "一", "二", "三", "四", "五", "六"];

    const DEFAULT_GYM = {
      胸: ["臥推", "上斜啞鈴推", "飛鳥"],
      背: ["引體向上", "划船", "硬舉"],
      腿: ["深蹲", "腿推", "弓箭步"],
      肩: ["肩推", "側平舉", "面拉"]
    };

    const state = {
      cursorDate: new Date(),
      selectedDateKey: toDateKey(new Date()),
      editRecordId: null,
      records: loadRecords(),
      gym: loadGymLibrary(),
      timerLeft: 90,
      timerId: null
    };

    const els = {
      monthLabel: document.getElementById("monthLabel"),
      calendarGrid: document.getElementById("calendarGrid"),
      prevMonthBtn: document.getElementById("prevMonthBtn"),
      nextMonthBtn: document.getElementById("nextMonthBtn"),
      fabBtn: document.getElementById("fabBtn"),
      scrim: document.getElementById("scrim"),
      daySheet: document.getElementById("daySheet"),
      sheetTitle: document.getElementById("sheetTitle"),
      sheetCards: document.getElementById("sheetCards"),
      closeSheetBtn: document.getElementById("closeSheetBtn"),
      appCover: document.getElementById("appCover"),
      closeCoverBtn: document.getElementById("closeCoverBtn"),
      tabs: [...document.querySelectorAll(".tab")],
      entryForm: document.getElementById("entryForm"),
      recordDate: document.getElementById("recordDate"),
      type: document.getElementById("type"),
      title: document.getElementById("title"),
      content: document.getElementById("content"),
      ocrArea: document.getElementById("ocrArea"),
      ocrInput: document.getElementById("ocrInput"),
      ocrBtn: document.getElementById("ocrBtn"),
      ocrStatus: document.getElementById("ocrStatus"),
      outdoorFields: document.getElementById("outdoorFields"),
      distance: document.getElementById("distance"),
      duration: document.getElementById("duration"),
      steps: document.getElementById("steps"),
      elevationUp: document.getElementById("elevationUp"),
      elevationDown: document.getElementById("elevationDown"),
      liftFields: document.getElementById("liftFields"),
      bodyPart: document.getElementById("bodyPart"),
      exercise: document.getElementById("exercise"),
      weight: document.getElementById("weight"),
      sets: document.getElementById("sets"),
      reps: document.getElementById("reps"),
      restSec: document.getElementById("restSec"),
      openTimerBtn: document.getElementById("openTimerBtn"),
      resetEntryBtn: document.getElementById("resetEntryBtn"),
      gymPartSelect: document.getElementById("gymPartSelect"),
      newPart: document.getElementById("newPart"),
      savePartBtn: document.getElementById("savePartBtn"),
      deletePartBtn: document.getElementById("deletePartBtn"),
      newExercise: document.getElementById("newExercise"),
      addExerciseBtn: document.getElementById("addExerciseBtn"),
      exerciseList: document.getElementById("exerciseList"),
      analyticsRange: document.getElementById("analyticsRange"),
      refreshAnalyticsBtn: document.getElementById("refreshAnalyticsBtn"),
      analyticsCards: document.getElementById("analyticsCards"),
      exportBtn: document.getElementById("exportBtn"),
      importBtn: document.getElementById("importBtn"),
      importFile: document.getElementById("importFile"),
      timerModal: document.getElementById("timerModal"),
      timerBox: document.getElementById("timerBox"),
      timerValue: document.getElementById("timerValue"),
      closeTimerBtn: document.getElementById("closeTimerBtn"),
      startTimerBtn: document.getElementById("startTimerBtn"),
      stopTimerBtn: document.getElementById("stopTimerBtn"),
      quickTimeBtns: [...document.querySelectorAll(".quick-time")]
    };

    function init() {
      bindEvents();
      els.recordDate.value = state.selectedDateKey;
      renderGymSelectors();
      syncTypeUI();
      renderCalendar();
      renderAnalytics();
      updateTimerText();
    }

    function bindEvents() {
      els.prevMonthBtn.addEventListener("click", () => {
        state.cursorDate = new Date(state.cursorDate.getFullYear(), state.cursorDate.getMonth() - 1, 1);
        renderCalendar();
      });
      els.nextMonthBtn.addEventListener("click", () => {
        state.cursorDate = new Date(state.cursorDate.getFullYear(), state.cursorDate.getMonth() + 1, 1);
        renderCalendar();
      });

      els.fabBtn.addEventListener("click", () => openCover("entry"));
      els.closeCoverBtn.addEventListener("click", closeCover);
      els.closeSheetBtn.addEventListener("click", closeDaySheet);
      els.scrim.addEventListener("click", () => { closeDaySheet(); closeCover(); });

      els.tabs.forEach((tab) => {
        tab.addEventListener("click", () => activateTab(tab.dataset.tab));
      });

      els.type.addEventListener("change", syncTypeUI);
      els.bodyPart.addEventListener("change", fillExerciseByPart);
      els.exercise.addEventListener("change", autofillLiftMemory);
      els.entryForm.addEventListener("submit", handleSaveRecord);
      els.resetEntryBtn.addEventListener("click", resetEntryForm);

      els.ocrBtn.addEventListener("click", runOCRFill);

      els.savePartBtn.addEventListener("click", savePart);
      els.deletePartBtn.addEventListener("click", deletePart);
      els.addExerciseBtn.addEventListener("click", addExercise);
      els.gymPartSelect.addEventListener("change", renderExerciseManager);

      els.refreshAnalyticsBtn.addEventListener("click", renderAnalytics);
      els.analyticsRange.addEventListener("change", renderAnalytics);

      els.exportBtn.addEventListener("click", exportData);
      els.importBtn.addEventListener("click", () => els.importFile.click());
      els.importFile.addEventListener("change", importData);

      els.openTimerBtn.addEventListener("click", openTimer);
      els.closeTimerBtn.addEventListener("click", closeTimer);
      els.startTimerBtn.addEventListener("click", () => startTimer(Number(els.restSec.value) || 90));
      els.stopTimerBtn.addEventListener("click", stopTimer);
      els.quickTimeBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          els.restSec.value = btn.dataset.sec;
          state.timerLeft = Number(btn.dataset.sec);
          updateTimerText();
        });
      });
    }

    function activateTab(tab) {
      els.tabs.forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tab));
      ["entry", "gym", "analytics", "backup"].forEach((id) => {
        document.getElementById(`tab-${id}`).classList.toggle("hidden", id !== tab);
      });
      if (tab === "analytics") renderAnalytics();
      if (tab === "gym") renderExerciseManager();
    }

    function openCover(tab) {
      activateTab(tab);
      els.scrim.classList.add("show");
      els.appCover.classList.add("show");
    }

    function closeCover() {
      els.appCover.classList.remove("show");
      if (!els.daySheet.classList.contains("show")) els.scrim.classList.remove("show");
    }

    function openDaySheet(dateKey, dateObj) {
      state.selectedDateKey = dateKey;
      state.cursorDate = new Date(dateObj.getFullYear(), dateObj.getMonth(), 1);
      els.recordDate.value = dateKey;
      renderCalendar();
      renderDayCards(dateKey);
      els.scrim.classList.add("show");
      els.daySheet.classList.add("show");
    }

    function closeDaySheet() {
      els.daySheet.classList.remove("show");
      if (!els.appCover.classList.contains("show")) els.scrim.classList.remove("show");
    }

    function syncTypeUI() {
      const type = els.type.value;
      const isLift = type === "lift";
      const showOCR = type === "run" || type === "walk" || type === "hike";
      els.liftFields.classList.toggle("hidden", !isLift);
      els.outdoorFields.classList.toggle("hidden", isLift);
      els.ocrArea.classList.toggle("hidden", !showOCR);
      if (isLift) autofillLiftMemory();
    }

    function renderCalendar() {
      const y = state.cursorDate.getFullYear();
      const m = state.cursorDate.getMonth();
      els.monthLabel.textContent = `${y} 年 ${m + 1} 月`;
      els.calendarGrid.innerHTML = "";

      DAY_NAMES.forEach((d) => {
        const el = document.createElement("div");
        el.className = "dow";
        el.textContent = d;
        els.calendarGrid.appendChild(el);
      });

      const first = new Date(y, m, 1);
      const start = first.getDay();
      const monthDays = new Date(y, m + 1, 0).getDate();
      const prevMonthDays = new Date(y, m, 0).getDate();

      for (let i = 0; i < 42; i += 1) {
        const day = document.createElement("button");
        day.type = "button";
        day.className = "day";

        let dateObj;
        let dayNum;
        if (i < start) {
          dayNum = prevMonthDays - start + i + 1;
          dateObj = new Date(y, m - 1, dayNum);
          day.classList.add("outside");
        } else if (i >= start + monthDays) {
          dayNum = i - start - monthDays + 1;
          dateObj = new Date(y, m + 1, dayNum);
          day.classList.add("outside");
        } else {
          dayNum = i - start + 1;
          dateObj = new Date(y, m, dayNum);
        }

        const key = toDateKey(dateObj);
        const records = state.records[key] || [];
        if (key === toDateKey(new Date())) day.classList.add("today");

        const intensity = Math.min(0.45, getDayIntensity(records) * 0.06);
        day.style.background = `rgba(37, 99, 235, ${0.04 + intensity})`;

        const head = document.createElement("div");
        head.className = "day-head";
        head.innerHTML = `<span>${dayNum}</span><span>${records.length || ""}</span>`;

        const mergedWrap = document.createElement("div");
        mergedWrap.className = "merged";
        const merged = mergeDayTypes(records);
        merged.slice(0, 3).forEach((item) => {
          const mEl = document.createElement("div");
          mEl.className = `merged-item ${item.type}`;
          mEl.textContent = item.label;
          mergedWrap.appendChild(mEl);
        });
        if (merged.length > 3) {
          const more = document.createElement("div");
          more.className = "merged-item";
          more.style.background = "#7f8ba2";
          more.textContent = `+${merged.length - 3}`;
          mergedWrap.appendChild(more);
        }

        day.appendChild(head);
        day.appendChild(mergedWrap);
        day.addEventListener("click", () => openDaySheet(key, dateObj));
        els.calendarGrid.appendChild(day);
      }
    }

    function mergeDayTypes(records) {
      const run = records.filter((r) => r.type === "run");
      const walk = records.filter((r) => r.type === "walk");
      const hike = records.filter((r) => r.type === "hike");
      const lift = records.filter((r) => r.type === "lift");
      const out = [];
      if (run.length) out.push({ type: "run", label: `跑步 x${run.length}` });
      if (walk.length) out.push({ type: "walk", label: `散步 x${walk.length}` });
      if (hike.length) out.push({ type: "hike", label: `登山 x${hike.length}` });
      if (lift.length) {
        const parts = [...new Set(lift.map((r) => r.bodyPart).filter(Boolean))];
        out.push({ type: "lift", label: `重訓: ${parts.slice(0, 2).join("、") || "綜合"}` });
      }
      return out;
    }

    function getDayIntensity(records) {
      let score = 0;
      records.forEach((r) => {
        if (r.type === "walk") score += Number(r.steps || 0) / 2500;
        if (r.type === "run") score += Number(r.distance || 0) / 2 + Number(r.duration || 0) / 40;
        if (r.type === "hike") score += Number(r.distance || 0) / 3 + Number(r.elevationUp || 0) / 400;
        if (r.type === "lift") score += (Number(r.weight || 0) * Number(r.sets || 0) * Number(r.reps || 0)) / 4500;
      });
      return score;
    }

    function renderDayCards(dateKey) {
      const [y, m, d] = dateKey.split("-").map(Number);
      els.sheetTitle.textContent = `${y}/${m}/${d} 運動卡片`;
      const records = state.records[dateKey] || [];
      if (!records.length) {
        els.sheetCards.innerHTML = `<div class="card">當日尚無紀錄</div>`;
        return;
      }
      els.sheetCards.innerHTML = records.map((r) => {
        const meta = recordMeta(r);
        return `
          <article class="card">
            <strong>${escapeHtml(r.title || "未命名")} (${typeLabel(r.type)})</strong>
            <div>${escapeHtml(r.content || "無備註")}</div>
            <div class="meta">${meta || "—"}</div>
            <div style="display:flex; gap:8px;">
              <button class="btn" data-edit-id="${r.id}">編輯</button>
              <button class="btn danger" data-delete-id="${r.id}">刪除</button>
            </div>
          </article>
        `;
      }).join("");

      els.sheetCards.querySelectorAll("[data-edit-id]").forEach((btn) => {
        btn.addEventListener("click", () => startEdit(btn.dataset.editId));
      });
      els.sheetCards.querySelectorAll("[data-delete-id]").forEach((btn) => {
        btn.addEventListener("click", () => deleteRecord(btn.dataset.deleteId));
      });
    }

    function recordMeta(r) {
      if (r.type === "lift") {
        const volume = Number(r.weight || 0) * Number(r.sets || 0) * Number(r.reps || 0);
        return [`部位 ${r.bodyPart || "-"}`, `動作 ${r.exercise || "-"}`, `重量 ${r.weight || 0}kg`, `組數 ${r.sets || 0}`, `次數 ${r.reps || 0}`, `負荷 ${volume}`].join(" | ");
      }
      return [
        `距離 ${r.distance || 0}km`,
        `時間 ${r.duration || 0} 分`,
        `步數 ${r.steps || 0}`,
        `爬升 ${r.elevationUp || 0}m`,
        `下降 ${r.elevationDown || 0}m`
      ].join(" | ");
    }

    function handleSaveRecord(event) {
      event.preventDefault();
      const dateKey = els.recordDate.value;
      if (!dateKey) return alert("請選擇日期");
      const title = els.title.value.trim();
      if (!title) return alert("請輸入標題");

      const type = els.type.value;
      const payload = {
        id: state.editRecordId || crypto.randomUUID(),
        type,
        title,
        content: els.content.value.trim(),
        createdAt: Date.now()
      };

      if (type === "lift") {
        payload.bodyPart = els.bodyPart.value;
        payload.exercise = els.exercise.value;
        payload.weight = normalizeNumber(els.weight.value);
        payload.sets = normalizeNumber(els.sets.value);
        payload.reps = normalizeNumber(els.reps.value);
      } else {
        payload.distance = normalizeNumber(els.distance.value);
        payload.duration = normalizeNumber(els.duration.value);
        payload.steps = normalizeNumber(els.steps.value);
        payload.elevationUp = normalizeNumber(els.elevationUp.value);
        payload.elevationDown = normalizeNumber(els.elevationDown.value);
      }

      if (!state.records[dateKey]) state.records[dateKey] = [];
      if (state.editRecordId) {
        replaceRecord(state.editRecordId, payload, dateKey);
      } else {
        state.records[dateKey].unshift(payload);
      }

      persistRecords();
      state.selectedDateKey = dateKey;
      renderCalendar();
      renderDayCards(dateKey);
      renderAnalytics();
      resetEntryForm();
      closeCover();
      openDaySheet(dateKey, fromDateKey(dateKey));
    }

    function replaceRecord(recordId, payload, targetDateKey) {
      Object.keys(state.records).forEach((key) => {
        state.records[key] = state.records[key].filter((r) => r.id !== recordId);
      });
      if (!state.records[targetDateKey]) state.records[targetDateKey] = [];
      state.records[targetDateKey].unshift(payload);
    }

    function deleteRecord(recordId) {
      if (!confirm("確定刪除這筆紀錄？")) return;
      Object.keys(state.records).forEach((key) => {
        state.records[key] = state.records[key].filter((r) => r.id !== recordId);
      });
      persistRecords();
      renderCalendar();
      renderDayCards(state.selectedDateKey);
      renderAnalytics();
    }

    function startEdit(recordId) {
      const { record, dateKey } = findRecordById(recordId);
      if (!record) return;
      state.editRecordId = recordId;
      openCover("entry");
      els.recordDate.value = dateKey;
      els.type.value = record.type;
      syncTypeUI();
      els.title.value = record.title || "";
      els.content.value = record.content || "";
      els.distance.value = record.distance ?? "";
      els.duration.value = record.duration ?? "";
      els.steps.value = record.steps ?? "";
      els.elevationUp.value = record.elevationUp ?? "";
      els.elevationDown.value = record.elevationDown ?? "";
      els.bodyPart.value = record.bodyPart || firstPart();
      fillExerciseByPart();
      els.exercise.value = record.exercise || firstExercise(els.bodyPart.value);
      els.weight.value = record.weight ?? "";
      els.sets.value = record.sets ?? "";
      els.reps.value = record.reps ?? "";
    }

    function findRecordById(recordId) {
      for (const [key, list] of Object.entries(state.records)) {
        const found = list.find((r) => r.id === recordId);
        if (found) return { record: found, dateKey: key };
      }
      return { record: null, dateKey: null };
    }

    function resetEntryForm() {
      state.editRecordId = null;
      els.entryForm.reset();
      els.recordDate.value = state.selectedDateKey;
      els.ocrInput.value = "";
      els.ocrStatus.textContent = "僅提取數字，不儲存圖片。";
      renderGymSelectors();
      syncTypeUI();
    }

    function renderGymSelectors() {
      const parts = Object.keys(state.gym);
      if (!parts.length) state.gym = { 綜合: ["自重訓練"] };
      const partOptions = Object.keys(state.gym).map((part) => `<option value="${escapeHtml(part)}">${escapeHtml(part)}</option>`).join("");
      els.bodyPart.innerHTML = partOptions;
      els.gymPartSelect.innerHTML = partOptions;
      fillExerciseByPart();
      renderExerciseManager();
    }

    function fillExerciseByPart() {
      const part = els.bodyPart.value || firstPart();
      const list = state.gym[part] || [];
      els.exercise.innerHTML = list.map((item) => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join("");
      autofillLiftMemory();
    }

    function firstPart() {
      return Object.keys(state.gym)[0] || "綜合";
    }

    function firstExercise(part) {
      return (state.gym[part] || [])[0] || "";
    }

    function savePart() {
      const oldPart = els.gymPartSelect.value;
      const newPart = els.newPart.value.trim();
      if (!newPart) return alert("請輸入部位名稱");
      if (oldPart && oldPart !== newPart && state.gym[oldPart]) {
        state.gym[newPart] = state.gym[oldPart];
        delete state.gym[oldPart];
      } else if (!state.gym[newPart]) {
        state.gym[newPart] = [];
      }
      persistGym();
      els.newPart.value = "";
      renderGymSelectors();
    }

    function deletePart() {
      const part = els.gymPartSelect.value;
      if (!part) return;
      if (!confirm(`刪除部位 ${part} 以及其動作？`)) return;
      delete state.gym[part];
      if (!Object.keys(state.gym).length) state.gym = { 綜合: ["自重訓練"] };
      persistGym();
      renderGymSelectors();
    }

    function addExercise() {
      const part = els.gymPartSelect.value || firstPart();
      const name = els.newExercise.value.trim();
      if (!name) return alert("請輸入動作名稱");
      if (!state.gym[part]) state.gym[part] = [];
      if (!state.gym[part].includes(name)) state.gym[part].push(name);
      els.newExercise.value = "";
      persistGym();
      renderGymSelectors();
    }

    function renderExerciseManager() {
      const part = els.gymPartSelect.value || firstPart();
      els.newPart.value = part;
      const list = state.gym[part] || [];
      els.exerciseList.innerHTML = list.map((name, idx) => `
        <div class="gym-item">
          <span>${escapeHtml(name)}</span>
          <div style="display:flex; gap:8px;">
            <button class="btn" data-ex-edit="${idx}">編輯</button>
            <button class="btn danger" data-ex-del="${idx}">刪除</button>
          </div>
        </div>
      `).join("") || `<div class="gym-item">此部位尚無動作</div>`;

      els.exerciseList.querySelectorAll("[data-ex-edit]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.exEdit);
          const next = prompt("編輯動作名稱", state.gym[part][i]);
          if (!next) return;
          state.gym[part][i] = next.trim();
          persistGym();
          renderGymSelectors();
        });
      });
      els.exerciseList.querySelectorAll("[data-ex-del]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.exDel);
          state.gym[part].splice(i, 1);
          persistGym();
          renderGymSelectors();
        });
      });
    }

    function autofillLiftMemory() {
      if (els.type.value !== "lift") return;
      const exercise = (els.exercise.value || "").trim();
      if (!exercise) return;
      const all = Object.values(state.records).flat();
      const last = all
        .filter((r) => r.type === "lift" && (r.exercise || "").trim() === exercise)
        .sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0))[0];
      if (!last) return;
      if (last.weight != null) els.weight.value = last.weight;
      if (last.sets != null) els.sets.value = last.sets;
      if (last.reps != null) els.reps.value = last.reps;
      if (last.bodyPart) els.bodyPart.value = last.bodyPart;
    }

    async function runOCRFill() {
      const file = els.ocrInput.files?.[0];
      if (!file) return alert("請先選擇截圖");
      if (!window.Tesseract) return alert("OCR 載入失敗，請確認網路");

      els.ocrBtn.disabled = true;
      els.ocrStatus.textContent = "正在辨識中...";

      try {
        const result = await Tesseract.recognize(file, "eng");
        const text = result.data.text || "";
        const parsed = parseWorkoutText(text);
        fillOCRParsed(parsed);
        els.ocrStatus.textContent = "辨識完成，可手動校對修改。";
      } catch (err) {
        els.ocrStatus.textContent = `辨識失敗：${err.message}`;
      } finally {
        els.ocrInput.value = "";
        els.ocrBtn.disabled = false;
      }
    }

    function parseWorkoutText(text) {
      const normalized = text.replace(/,/g, "");
      const get = (re) => {
        const m = normalized.match(re);
        return m ? Number(m[1]) : null;
      };
      return {
        distance: get(/(?:distance|dist|km)\s*[:=]?\s*(\d+(?:\.\d+)?)/i) ?? get(/(\d+(?:\.\d+)?)\s*km/i),
        duration: get(/(?:time|duration|min)\s*[:=]?\s*(\d+(?:\.\d+)?)/i) ?? null,
        steps: get(/(?:steps?|step)\s*[:=]?\s*(\d+)/i),
        elevationUp: get(/(?:elev(?:ation)?(?:\s*gain)?|ascent|climb)\s*[:=]?\s*(\d+(?:\.\d+)?)/i),
        elevationDown: get(/(?:descent|down)\s*[:=]?\s*(\d+(?:\.\d+)?)/i)
      };
    }

    function fillOCRParsed(parsed) {
      if (parsed.distance != null) els.distance.value = parsed.distance;
      if (parsed.duration != null) els.duration.value = parsed.duration;
      if (parsed.steps != null) els.steps.value = parsed.steps;
      if (parsed.elevationUp != null) els.elevationUp.value = parsed.elevationUp;
      if (parsed.elevationDown != null) els.elevationDown.value = parsed.elevationDown;
    }

    function openTimer() {
      state.timerLeft = Number(els.restSec.value) || 90;
      updateTimerText();
      els.timerModal.classList.add("show");
    }

    function closeTimer() {
      els.timerModal.classList.remove("show");
    }

    function startTimer(sec) {
      stopTimer();
      state.timerLeft = Math.max(1, Math.floor(sec));
      updateTimerText();
      state.timerId = setInterval(() => {
        state.timerLeft -= 1;
        updateTimerText();
        if (state.timerLeft <= 0) {
          stopTimer();
          triggerTimerAlert();
        }
      }, 1000);
    }

    function stopTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function updateTimerText() {
      els.timerValue.textContent = formatTime(state.timerLeft);
    }

    function triggerTimerAlert() {
      els.timerBox.classList.add("breathing-alert");
      beepSoft();
      setTimeout(() => els.timerBox.classList.remove("breathing-alert"), 5600);
    }

    function beepSoft() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;
        [0, 0.4, 0.8].forEach((off) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.value = 740;
          osc.connect(gain);
          gain.connect(ctx.destination);
          gain.gain.setValueAtTime(0.001, now + off);
          gain.gain.exponentialRampToValueAtTime(0.15, now + off + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, now + off + 0.26);
          osc.start(now + off);
          osc.stop(now + off + 0.28);
        });
      } catch {
        alert("休息時間結束");
      }
    }

    function renderAnalytics() {
      const range = els.analyticsRange.value;
      const rows = collectRangeRecords(range);
      const stats = {
        steps: 0,
        runDist: 0,
        hikeDist: 0,
        elevation: 0,
        liftVolume: 0
      };
      rows.forEach((r) => {
        if (r.type === "walk") stats.steps += Number(r.steps || 0);
        if (r.type === "run") {
          stats.runDist += Number(r.distance || 0);
          stats.elevation += Number(r.elevationUp || 0);
        }
        if (r.type === "hike") {
          stats.hikeDist += Number(r.distance || 0);
          stats.elevation += Number(r.elevationUp || 0);
        }
        if (r.type === "lift") {
          stats.liftVolume += Number(r.weight || 0) * Number(r.sets || 0) * Number(r.reps || 0);
        }
      });

      els.analyticsCards.innerHTML = `
        <div class="card"><strong>散步總步數</strong><div>${formatNum(stats.steps)} 步</div></div>
        <div class="card"><strong>跑步總距離</strong><div>${stats.runDist.toFixed(2)} km</div></div>
        <div class="card"><strong>登山總距離</strong><div>${stats.hikeDist.toFixed(2)} km</div></div>
        <div class="card"><strong>總爬升</strong><div>${formatNum(stats.elevation)} m</div></div>
        <div class="card"><strong>重訓總負荷量</strong><div>${formatNum(stats.liftVolume)}</div></div>
      `;
    }

    function collectRangeRecords(range) {
      const now = new Date();
      const all = Object.entries(state.records);
      return all
        .filter(([key]) => inRange(fromDateKey(key), range, now))
        .flatMap(([, list]) => list);
    }

    function inRange(date, range, now) {
      if (range === "day") {
        return toDateKey(date) === toDateKey(now);
      }
      if (range === "month") {
        return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
      }
      if (range === "quarter") {
        const q = Math.floor(now.getMonth() / 3);
        return date.getFullYear() === now.getFullYear() && Math.floor(date.getMonth() / 3) === q;
      }
      return date.getFullYear() === now.getFullYear();
    }

    function exportData() {
      const payload = { records: state.records, gym: state.gym };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `workout-v26-backup-${toDateKey(new Date())}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function importData(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!parsed || typeof parsed !== "object") throw new Error("格式錯誤");
        state.records = parsed.records && typeof parsed.records === "object" ? parsed.records : {};
        state.gym = parsed.gym && typeof parsed.gym === "object" ? parsed.gym : DEFAULT_GYM;
        persistRecords();
        persistGym();
        renderGymSelectors();
        renderCalendar();
        renderAnalytics();
        alert("匯入成功");
      } catch (err) {
        alert(`匯入失敗：${err.message}`);
      } finally {
        event.target.value = "";
      }
    }

    function persistRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records));
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function persistGym() {
      localStorage.setItem(GYM_KEY, JSON.stringify(state.gym));
    }

    function loadGymLibrary() {
      try {
        const raw = localStorage.getItem(GYM_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (!parsed || typeof parsed !== "object") return structuredClone(DEFAULT_GYM);
        return parsed;
      } catch {
        return structuredClone(DEFAULT_GYM);
      }
    }

    function toDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function fromDateKey(key) {
      const [y, m, d] = key.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatTime(sec) {
      const s = Math.max(0, Number(sec || 0));
      const m = Math.floor(s / 60);
      const ss = s % 60;
      return `${String(m).padStart(2, "0")}:${String(ss).padStart(2, "0")}`;
    }

    function normalizeNumber(v) {
      if (v === "" || v == null) return null;
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function formatNum(v) {
      return Number(v || 0).toLocaleString("zh-Hant");
    }

    function typeLabel(type) {
      return { run: "跑步", walk: "散步", hike: "登山", lift: "重訓" }[type] || type;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    init();
  </script>
